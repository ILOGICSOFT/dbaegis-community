}

function restoreSecurityCancel() {
  var pending = window._restoreSecurityPending;
  window._restoreSecurityPending = null;
  closeModal();
  if (pending && pending.reject) pending.reject(new Error('Restore cancelled'));
}

async function restoreSecuritySubmit() {
  var pending = window._restoreSecurityPending;
  if (!pending) return;
  var reason = String((document.getElementById('restore_security_reason') || {}).value || '').trim();
  var password = String((document.getElementById('restore_security_password') || {}).value || '');
  var confirmEl = document.getElementById('restore_security_confirm');
  var confirmation = confirmEl ? String(confirmEl.value || '').trim() : '';
  if (!reason) { showToast('Restore reason is required', 'error'); return; }
  if (confirmEl && confirmation !== pending.details.target) {
    showToast('Type the target name exactly', 'error');
    return;
  }
  if (!password) { showToast('Password is required', 'error'); return; }
  try {
    var auth = await apiFetch('/api/restore/authorize', {method:'POST', body:JSON.stringify({password:password})});
    var body = pending.payload;
    body.options = body.options || {};
    body.restore_reason = reason;
    body.restore_confirmation = confirmation;
    body.restore_authorization_token = auth.restore_authorization_token;
    body.options.restore_reason = reason;
    if (confirmation) body.options.restore_confirmation = confirmation;
    window._restoreSecurityPending = null;
    closeModal();
    pending.resolve(body);
  } catch(e) {
    showToast('Authorization failed: ' + (e.message || e), 'error');
  }
}

function restorePayloadText(body, keys) {
  body = body || {};
  var opts = body.options || {};
  var sources = [body, opts];
  for (var s = 0; s < sources.length; s++) {
    var source = sources[s] || {};
    for (var i = 0; i < keys.length; i++) {
      var value = source[keys[i]];
      if (value !== undefined && value !== null && value !== '') {
        var text = String(value).trim();
        if (text) return text;
      }
    }
  }
  return '';
}

function restorePayloadConnection(body) {
  body = body || {};
  var connId = restorePayloadText(body, ['target_connection_id','connection_id']);
  return (S.connections || []).find(function(c){ return String(c.id) === String(connId); }) || {};
}

function restorePayloadConnectionText(conn, keys) {
  conn = conn || {};
  for (var i = 0; i < keys.length; i++) {
    var value = conn[keys[i]];
    if (value !== undefined && value !== null && value !== '') {
      var text = String(value).trim();
      if (text) return text;
    }
  }
  return '';
}

function restorePayloadHasValue(body, payloadKeys, connectionKeys) {
  var text = restorePayloadText(body, payloadKeys || []);
  if (text) return true;
  return !!restorePayloadConnectionText(restorePayloadConnection(body), connectionKeys || []);
}

function restorePayloadSourcePath(body) {
  var path = restorePayloadText(body, ['source_path','custom_file_path']);
  if (path) return path;
  var opts = (body || {}).options || {};
  var keys = restoreSourceOptionKeys();
  for (var i = 0; i < keys.length; i++) {
    var value = opts[keys[i]];
    if (value !== undefined && value !== null && value !== '') {
      var text = String(value).trim();
      if (text) return text;
    }
  }
  return '';
}

function restorePayloadHasBackupId(body) {
  var backupId = restorePayloadText(body, ['backup_id']);
  return !!backupId && !isNaN(Number(backupId)) && Number(backupId) > 0;
}

function restoreStartRequiredFieldErrors(body) {
  body = body || {};
  var errors = [];
  var conn = restorePayloadConnection(body);
  var connId = restorePayloadText(body, ['target_connection_id','connection_id']);
  var db = normalizeDbType(restorePayloadText(body, ['db_type','database_type','type']) || conn.db_type || '');
  var mode = String(restorePayloadText(body, ['restore_mode']) || '').toLowerCase();
  if (!mode && db) mode = normalizeRestoreModeForDb(db, 'logical');
  var sourcePath = restorePayloadSourcePath(body);
  var hasBackup = restorePayloadHasBackupId(body);
  var sourceType = String(body.source_type || '').trim();
  if (!sourceType) sourceType = hasBackup ? 'inventory' : (isRestoreCloudSourcePath(sourcePath) ? 'cloud_file' : 'local_path');
  var remoteSource = isRestoreCloudSourcePath(sourcePath);

  function add(message) {
    if (errors.indexOf(message) < 0) errors.push(message);
  }
  function req(label, payloadKeys, connectionKeys) {
    if (!restorePayloadHasValue(body, payloadKeys, connectionKeys)) add(label + ' is required');
  }

  if (!connId || isNaN(Number(connId)) || Number(connId) <= 0) add('Connection is required');
  if (!db) add('Database type is required');
  if (!mode) add('Restore type is required');
  if (db && mode && !supportsRestoreMode(db, mode)) add('Selected database does not support ' + mode + ' restore');

  if (sourceType === 'inventory' && !hasBackup) {
    add('Select an inventory backup first');
  } else if (!sourcePath && !hasBackup) {
    add('Restore source file or inventory backup is required');
  }

  if (sourceType === 'cloud_file' && !remoteSource) {
    add('Selected Cloud File URI is required');
  }
  if (remoteSource && !hasBackup) {
    var sourceStorageId = restorePayloadText(body, ['source_storage_id','storage_id','source_destination']);
    if (!sourceStorageId) {
      add('Cloud storage location is required for external cloud file restores');
    } else {
      var sourceStorage = restoreCloudStorageById(sourceStorageId);
      var uriStorageType = restoreCloudStorageTypeFromUri(sourcePath);
      var selectedStorageType = restoreCloudStorageType(sourceStorage);
      if (!sourceStorage) {
        add('Selected cloud storage location was not found');
      } else if (uriStorageType && selectedStorageType && uriStorageType !== selectedStorageType) {
        add('Selected Cloud File URI must match the Cloud Storage Type');
      }
    }
  }

  var serverStagedCloudModes = {
    'oracle:logical': true,
    'oracle:physical': true,
    'mssql:physical': true
  };
  if (remoteSource && serverStagedCloudModes[db + ':' + mode]) {
    req('DB VM temp / staging location', [
      'db_vm_temp_dir',
      'server_temp_dir',
      'restore_server_temp_dir',
      'db_server_temp_dir',
      'remote_restore_temp_dir',
      'remote_temp_dir',
      'server_staging_dir',
      'remote_staging_path'
    ]);
  }

  if (db === 'postgresql' && mode === 'physical') {
    req('PostgreSQL target PGDATA', ['target_pgdata']);
  } else if ((db === 'mysql' || db === 'mariadb') && mode === 'physical') {
    req('MySQL/MariaDB target data directory', ['target_datadir']);
  } else if (db === 'mongodb' && mode === 'physical') {
    req('MongoDB target dbPath', ['target_dbpath']);
  } else if (db === 'sqlite') {
    req('SQLite target database path', ['target_path','target_name','database_name','database','path'], ['database','database_name','path','host']);
  } else if (db === 'cassandra') {
    req('Cassandra target keyspace', ['target_keyspace','keyspace','target_database','database_name','database'], ['database','database_name']);
    req('Cassandra target table', ['target_table','table','source_table']);
  } else if (db === 'dynamodb') {
    req('DynamoDB target table', ['target_table','table_name','table','database_name','database'], ['database','database_name']);
  } else if (db === 'azuresql') {
    req('Azure SQL server name', ['server_name','server','source_server_name','target_server_name'], ['host']);
    req('Azure SQL target database', ['target_database','database_name','database','target_name'], ['database','database_name']);
  } else if (db === 'cosmosdb') {
    req('Cosmos DB target database', ['target_database','database_name','database','target_name'], ['database','database_name']);
    req('Cosmos DB target container', ['target_container','container_name','container','target_table','table_name','table']);
  } else if (db === 'firestore') {
    if (!restorePayloadHasValue(body, ['emulator_host','firestore_emulator_host','endpoint_url','endpoint'], ['host'])) {
      req('Firestore GCP project ID', ['project_id','database_name','database'], ['database','database_name']);
    }
  } else if (db === 'couchdb') {
    req('CouchDB target database', ['target_database','database_name','database','target_name'], ['database','database_name']);
  } else if (db === 'mssql') {
    req('SQL Server target database', ['target_database','database_name','database','target_name'], ['database','database_name']);
  }

  return errors;
}

function validateRestoreStartPayload(body) {
  var errors = restoreStartRequiredFieldErrors(body);
  if (!errors.length) return true;
  showToast(errors.slice(0, 3).join('; ') + (errors.length > 3 ? '; ...' : ''), 'error');
  return false;
}

async function createRestoreJob() {
  try {
    var body = JSON.parse(JSON.stringify(window._rf||{}));
    body.connection_id = parseInt(body.connection_id);
    body.options = body.options || {};
    if (body.restore_mode) body.options.restore_mode = body.restore_mode;
    if (body.source_type !== 'inventory') {
      delete body.backup_id;
    } else {
      body.backup_id = parseInt(body.backup_id);
    }
    delete body.target_mode;
    delete body.target_name;

    if (body.options.include_schemas_text) body.options.include_schemas = body.options.include_schemas_text.split(',').map(function(x){return x.trim();}).filter(Boolean);
    if (body.options.exclude_schemas_text) body.options.exclude_schemas = body.options.exclude_schemas_text.split(',').map(function(x){return x.trim();}).filter(Boolean);
    if (body.options.include_tables_text) body.options.include_tables = body.options.include_tables_text.split(',').map(function(x){return x.trim();}).filter(Boolean);
    if (body.options.exclude_tables_text) body.options.exclude_tables = body.options.exclude_tables_text.split(',').map(function(x){return x.trim();}).filter(Boolean);
    body = normalizeRestoreSourcePayload(body);
    body.options = normalizeRestoreJobOptionsForContext(body.db_type, body.restore_mode, body.options);
    body = normalizeRestoreSourcePayload(body);
    if (!licenseDatabaseEnabled(body.db_type)) {
      showToast(licenseFeatureNotice(dn(body.db_type)), 'error');
      return;
    }
    if (!licenseRestoreModeEnabled(body.restore_mode)) {
      showToast(licenseFeatureNotice('Physical restores'), 'error');
      return;
    }
    if (body.source_type === 'inventory' && (!body.backup_id || isNaN(Number(body.backup_id)))) {
      showToast('Select an inventory backup first', 'error');
      return;
    }
    if (body.source_type === 'cloud_file') {
      if (!licenseFeatureEnabled('restores.cloud')) {
        showToast(licenseFeatureNotice('Cloud restores'), 'error');
        return;
      }
      if (!isRestoreCloudSourcePath(body.source_path)) {
        showToast('Select a cloud file or enter a full s3://, gcs://, gs://, azure://, or az:// URI', 'error');
        return;
      }
      if (!String(body.source_storage_id || '').trim()) {
        showToast('Cloud storage location is required for external cloud file restores', 'error');
        return;
      }
    }
    if (body.source_type !== 'inventory' && isRestoreCloudSourcePath(body.source_path) && !String(body.source_storage_id || '').trim()) {
      showToast('Cloud storage location is required for cloud restores', 'error');
      return;
    }
    if (body.source_type !== 'inventory' && isRestoreCloudSourcePath(body.source_path) && !licenseFeatureEnabled('restores.cloud')) {
      showToast(licenseFeatureNotice('Cloud restores'), 'error');
      return;
    }
    if (!validateRestoreStartPayload(body)) return;
    body = await prepareRestoreStartPayload(body);
    var j = await apiFetch('/api/restore/start', {
      method:'POST',
      body: JSON.stringify(body)
    });
    showToast(j.message || 'Restore job created');
    closeModal();
    await refresh();
  } catch(e) {
    if (String(e && e.message || e) === 'Restore cancelled') return;
    showToast('Failed: '+e.message, 'error');
  }
}

async function runRestoreJob(id) {
  try {
    var job = (S.restoreJobs || []).find(function(j){ return String(j.id) === String(id); }) || {};
    if (dashboardIsFailureStatus(job.status) && !restoreJobRetryAvailable(job)) {
      showToast('Restore retry window expired; create a new restore job', 'error');
      return;
    }
    var payload = {
      connection_id: job.connection_id,
      target_connection_id: job.connection_id,
      db_type: job.db_type,
      restore_mode: job.restore_mode,
      source_path: job.source_path || '',
      backup_id: job.backup_id || '',
      options: {}
    };
    try { payload.options = JSON.parse(job.options_json || '{}'); } catch(e) {}
    if (!validateRestoreStartPayload(payload)) return;
    payload = await prepareRestoreStartPayload(payload);
    var j = await apiFetch('/api/restore/jobs/'+id+'/run', {method:'POST', body:JSON.stringify(payload)});
    showToast('Restore job started — opening log…');
    await new Promise(function(res){ setTimeout(res, 400); });
    viewRuntimeLog('restore', id);
  } catch(e) {
    if (String(e && e.message || e) === 'Restore cancelled') return;
    showToast('Failed: '+e.message, 'error');
  }
}

function vRestoreJobs() {
  var J = S.restoreJobs || [];
  var P  = (S._rjDateFrom || S._rjDateTo) ? 'custom' : (S._rjPeriod  || 'all');
  var FS = S._rjStatus  || 'all';
  var Q  = (S._rjSearch || '').toLowerCase().trim();
  var DF = S._rjDateFrom || '';
  var DT = S._rjDateTo   || '';
  var rjDateRangeActive = !!(DF || DT);
  var rjPeriods = [
    ['all', 'ALL'],
    ['day', '1 Day'],
    ['week', '1 Week'],
    ['month', '1 Month'],
    ['quarter', '3 Months'],
    ['half', '6 Months'],
    ['year', '1 Year'],
    ['custom', 'Custom Range']
  ];
  var rjStatuses = [
    ['all', 'ALL'],
    ['success', 'SUCCESS'],
    ['failed', 'FAILED'],
    ['running', 'RUNNING'],
    ['pending', 'PENDING']
  ];

  function toMs(v) {
    if (!v) return 0;
    var s = String(v).replace(' ', 'T');
    var t = Date.parse(s);
    return isNaN(t) ? 0 : t;
  }

  function inPeriod(ms) {
    if (!ms || P === 'all') return true;
    var now = Date.now();
    var days = activityPeriodDays(P);
    return !days || ms >= (now - days * 86400000);
  }

  function inDateRange(ms) {
    if (!DF && !DT) return true;
    if (!ms) return false;
    var ok = true;
    if (DF) ok = ok && ms >= Date.parse(DF + 'T00:00:00');
    if (DT) ok = ok && ms <= Date.parse(DT + 'T23:59:59');
    return ok;
  }
  function durationLabel(ms) {
    if (!ms || ms < 0) return '--';
    var sec = Math.floor(ms / 1000);
    if (sec < 60) return sec + 's';
    var min = Math.floor(sec / 60);
    if (min < 60) return min + 'm ' + (sec % 60) + 's';
    var hrs = Math.floor(min / 60);
    if (hrs < 48) return hrs + 'h ' + (min % 60) + 'm';
    var days = Math.floor(hrs / 24);
    return days + 'd ' + (hrs % 24) + 'h';
  }
  function restoreJobElapsed(j) {
    var start = toMs(j.started_at || j.created_at);
    if (!start) return '--';
    var st = String(j.status || '').toLowerCase();
    var stop = (dashboardIsRunningStatus(st) || dashboardIsPendingStatus(st))
      ? Date.now()
      : (toMs(j.finished_at || j.completed_at || j.updated_at) || Date.now());
    return durationLabel(stop - start);
  }
  function restoreJobPhase(j, opts) {
    var st = String(j.status || '').toLowerCase();
    if (dashboardIsFailureStatus(st)) return restoreJobRetryAvailable(j) ? 'Needs review' : 'Retry expired';
    if (dashboardIsSuccessStatus(st)) return 'Completed';
    if (dashboardIsPendingStatus(st)) return 'Waiting';
    var mode = String(j.restore_mode || (opts || {}).restore_mode || '').toLowerCase();
    if (mode === 'physical') {
      if ((opts || {}).validate_only) return 'RMAN validate';
      if ((opts || {}).pitr_enabled || (opts || {}).pitr_target_time || (opts || {}).pitr_target_scn || (opts || {}).recovery_target_time || (opts || {}).restore_point || (opts || {}).binlog_stop_datetime || (opts || {}).binlog_stop_position || (opts || {}).stopat || (opts || {}).stop_at || (opts || {}).log_backup_source || (opts || {}).log_backup_files) return 'PITR recovery';
      return 'Physical restore';
    }
    return 'Logical restore';
  }
  function shortPath(value, maxLen) {
    var s = String(value || '-');
    maxLen = maxLen || 80;
    if (s.length <= maxLen) return s;
    return s.slice(0, Math.max(8, maxLen - 24)) + '...' + s.slice(-18);
  }
  if (!J.length) {
    var hasRestoreable = (S.connections||[]).some(function(c){ return supportsRestoreDb(c.db_type); });
    return emptyState('restore', 'No restore jobs yet', hasRestoreable ? 'Click + New Restore Job to create one' : 'No restore-supported connections available yet');
  }

  var filtered = J.filter(function(j){
    var opts = {};
    try { opts = JSON.parse(j.options_json || '{}'); } catch(e) {}
    var target = opts.target_name || j.target_mode || '';
    var createdMs = toMs(j.created_at);
    var hay = [
      j.id,
      j.db_type,
      j.connection_name,
      j.tags,
      j.restore_mode,
      j.source_path,
      target,
      j.status,
      j.error_msg,
      j.message
    ].join(' ').toLowerCase();

    if (Q && hay.indexOf(Q) < 0) return false;
    if (FS !== 'all') {
      if (!dashboardStatusMatchesFilter(j.status, FS)) return false;
    }
    if (!inPeriod(createdMs)) return false;
    if (!inDateRange(createdMs)) return false;
    return true;
  });

  var rows = filtered.map(function(j){
    var st = String(j.status || '').toLowerCase();
    var statusColor = dashboardIsSuccessStatus(st) ? '#00D97E' : (dashboardIsFailureStatus(st) ? '#FF5A5A' : (dashboardIsRunningStatus(st) ? '#4E9FFF' : '#FFB900'));
    var retryAvailable = restoreJobRetryAvailable(j);
    var retryExpired = dashboardIsFailureStatus(j.status) && !restoreJobIsDismissed(j) && !retryAvailable;
    var runBtnLabel = dashboardIsFailureStatus(st) ? 'Retry' : 'Run';
    var runBtn = (dashboardIsPendingStatus(st) || retryAvailable)
      ? '<button class="btn-sm" onclick="runRestoreJob('+j.id+')">'+runBtnLabel+'</button>'
      : '';
    var cancelBtn = dashboardIsRunningStatus(st)
      ? '<button class="btn-sm" style="background:#FF5A5A22;color:#FF5A5A;border-color:#FF5A5A44;margin-left:6px" onclick="cancelRestore('+j.id+')">Cancel</button>'
      : '';
    var logBtn = '<button class="btn-sm" onclick="viewRuntimeLog(\'restore\','+j.id+')">Log</button>';
    var opts = {};
    try { opts = JSON.parse(j.options_json || '{}'); } catch(e) {}
    var mode = j.restore_mode || opts.restore_mode || '-';
    var target = opts.target_name || j.target_mode || '';
    var msg = j.error_msg || j.message || j.log || '';
    var phase = restoreJobPhase(j, opts);
    var elapsed = restoreJobElapsed(j);
    var pitrActive = !!(opts.pitr_enabled || opts.pitr_target_time || opts.pitr_target_scn || opts.recovery_target_time || opts.restore_point || opts.binlog_stop_datetime || opts.binlog_stop_position || opts.stopat || opts.stop_at || opts.log_backup_source || opts.log_backup_files);
    var dismissed = restoreJobIsDismissed(j);
    var sourceLabel = shortPath(j.source_path || '', 82);
    var pendingLabel = st === 'pending_approval' ? 'PENDING' : String(j.status||'').toUpperCase();
    var statusHtml =
      dashboardIsSuccessStatus(st) ? '<span style="color:#00D97E;font-weight:700">SUCCESS</span>' :
      dashboardIsFailureStatus(st) ? '<span style="color:#FF5A5A;font-weight:700">'+escHtml(String(j.status||'').toUpperCase())+'</span>'  :
      dashboardIsRunningStatus(st) ? '<span style="color:#4E9FFF;font-weight:700">RUNNING</span>' :
      dashboardIsPendingStatus(st)
        ? '<span style="color:#F5C451;font-weight:700">' + escHtml(pendingLabel) + '</span>'
        : '<span>' + escHtml(j.status||'') + '</span>';

    return '<div class="card restore-job-card">'
      + '<div style="display:flex;align-items:flex-start;gap:12px">'
      + '<div style="width:38px;height:38px;border-radius:9px;background:'+dc(j.db_type)+'22;border:1px solid '+dc(j.db_type)+'44;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+dicon(j.db_type,20)+'</div>'
      + '<div style="flex:1;min-width:0">'
      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">'
      + '<span style="font-size:13px;color:#E2E8F0">Restore #'+j.id+'</span>'
      + '<span class="tag" style="background:'+statusColor+'18;color:'+statusColor+';border-color:'+statusColor+'44">'+escHtml(pendingLabel)+'</span>'
      + '<span class="tag" style="background:#1E2640;color:#94A3B8">'+escHtml(String(mode || '').toUpperCase())+'</span>'
      + (pitrActive ? '<span class="tag" style="background:#4E9FFF18;color:#8FC7FF;border-color:#4E9FFF44">PITR</span>' : '')
      + (dismissed ? '<span class="tag" style="background:#64748B18;color:#94A3B8;border-color:#64748B44">DISMISSED</span>' : '')

          + '<div style="min-width:0"><div style="font-size:11px;color:#FF9999">'+escHtml(insight.cause)+'</div><div style="font-size:10px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(insight.action)+'</div></div>'

    + '<select onchange="setRestoreJobPeriod(this.value)" style="width:150px;padding:8px 10px;background:#0B0E17;border:1px solid #2A3350;border-radius:7px;color:#E2E8F0;font-family:inherit;font-size:13px">'

      + '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8;margin:0">To<input id="rj-date-to" type="date" value="'+escHtml(DT)+'" onchange="setRestoreJobDateTo(this.value)" style="width:150px" /></label>'
      + dateRangeClearButtonHtml('clearRestoreJobDateRange()', rjDateRangeActive, 'rj-date-clear')

    + restoreMetrics

    +'<div class="form-panel" style="margin-bottom:18px">'

    +'</div></div></div>'

    + buildRestoreJobGroups(rows)
    +'</div>';

function notificationTestResults() {
  try { return JSON.parse(localStorage.getItem('dbaegis_notification_test_results') || '{}') || {}; }
  catch(e) { return {}; }
}

function setNotificationTestResult(key, result) {
  var data = notificationTestResults();
  data[String(key)] = Object.assign({checked_at:new Date().toISOString()}, result || {});
  try { localStorage.setItem('dbaegis_notification_test_results', JSON.stringify(data)); } catch(e) {}
}

function reportDateISO(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function reportEnsureDateRange() {
  if (!S.reportDateTo) S.reportDateTo = reportDateISO(new Date());
  if (!S.reportDateFrom) {
    var d = new Date();
    d.setDate(d.getDate() - 30);
    S.reportDateFrom = reportDateISO(d);
  }
  if (S.reportDateFrom && S.reportDateTo && S.reportDateFrom > S.reportDateTo) {
    var tmp = S.reportDateFrom;
    S.reportDateFrom = S.reportDateTo;
    S.reportDateTo = tmp;
  }
}

function reportSetDateRange(which, value) {
  value = String(value || '').slice(0, 10);
  if (which === 'from') S.reportDateFrom = value;
  if (which === 'to') S.reportDateTo = value;
  reportEnsureDateRange();
  render();
}

function reportRangeBounds() {
  reportEnsureDateRange();
  return {
    from: S.reportDateFrom,
    to: S.reportDateTo,
    fromTs: S.reportDateFrom + ' 00:00:00',
    toTs: S.reportDateTo + ' 23:59:59'
  };
}

function reportSetTag(value) {
  S.reportTag = String(value || '');
  render();
}

function reportTagMatches(conn, tag) {
  tag = String(tag || '').toLowerCase();
  if (!tag) return true;
  return connectionTags(conn).map(function(t){ return t.toLowerCase(); }).indexOf(tag) >= 0;
}

function reportTimestampInRange(value, range) {
  var text = String(value || '').trim().replace('T', ' ');
  if (!text) return false;
  if (/^\d{4}-\d{2}-\d{2}$/.test(text)) text += ' 00:00:00';
  text = text.slice(0, 19);
  return text >= range.fromTs && text <= range.toTs;
}

function reportIsSuccess(status) {
  return dashboardIsSuccessStatus(status);
}

function reportLicenseFeature(name) {
  return String(name || '').toLowerCase() === 'audit-events' ? 'audit.export' : 'reports.csv';
}

function reportDownload(name) {
  if (!authIsAdmin()) { showToast('Reports are available to admins only', 'error'); return; }
  if (!licenseFeatureEnabled(reportLicenseFeature(name))) { showToast(licenseFeatureNotice('CSV report export'), 'error'); return; }
  var range = reportRangeBounds();
  var path = '/api/reports/' + encodeURIComponent(name) + '/csv?date_from=' + encodeURIComponent(range.from) + '&date_to=' + encodeURIComponent(range.to);
  if (S.reportTag && name !== 'audit-events') path += '&tag=' + encodeURIComponent(S.reportTag);
  var a = document.createElement('a');
  a.href = API + path;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setReportGenerated(name);
  render();
}

function reportGeneratedState() {
  try { return JSON.parse(localStorage.getItem('dbaegis_report_generated') || '{}') || {}; }
  catch(e) { return {}; }
}

function setReportGenerated(name) {
  var data = reportGeneratedState();
  data[String(name)] = new Date().toISOString();
  try { localStorage.setItem('dbaegis_report_generated', JSON.stringify(data)); } catch(e) {}
}

// ── Webhook CRUD actions ──────────────────────────────────────────────────────
async function whTest(id) {
  try {
    await apiFetch('/api/webhooks/'+id+'/test', {method:'POST'});
    setNotificationTestResult('webhook_' + id, {ok:true, message:'Test payload sent'});
    showToast('Test payload sent!');
    render();
  } catch(e) {
    setNotificationTestResult('webhook_' + id, {ok:false, message:e.message || String(e)});
    showToast('Test failed: '+(e.message||e), 'error');
    render();
  }
}

async function sendWebhookSummary24h() {
  try {
    var res = await apiFetch('/api/notifications/global/daily-summary/send', {
      method:'POST',
      body: JSON.stringify({window:'last_24_hours', delivery:'webhook', force:true})
    });
    showToast((res && res.message) ? res.message : 'Last 24h summary sent to webhooks');
  } catch(e) {
    showToast('Webhook summary failed: ' + (e.message || e), 'error');
  }
}

async function whToggle(id) {
  try {
    var w = (S.webhooks || []).find(function(x){ return String(x.id) === String(id); });
    if (!w) throw new Error('Webhook not found');

    var action = w.active ? 'disable' : 'enable';
    var r = await apiFetch('/api/webhooks/' + id + '/' + action, {method:'POST'});

    showToast((r && r.active) ? 'Webhook enabled' : 'Webhook disabled');
    S.webhooks = await apiFetch('/api/webhooks/');
    render();
  } catch(e) { showToast('Failed: '+(e.message||e), 'error'); }
}

async function whDelete(id) {
  if (!confirm('Delete this webhook?')) return;
  try {
    await apiFetch('/api/webhooks/'+id, {method:'DELETE'});
    showToast('Webhook deleted');
    S.webhooks = await apiFetch('/api/webhooks/');
    render();
  } catch(e) { showToast('Failed: '+(e.message||e), 'error'); }
}

  try {
    const val = parseInt((document.getElementById('self_backup_retention_count')||{}).value || '10', 10);

    const base_path = String((document.getElementById('self_backup_base_path')||{}).value || '').trim();
    const autoEl = document.getElementById('self_backup_auto_enabled');
    const autoCron = String((document.getElementById('self_backup_auto_cron')||{}).value || '').trim();
    const payload = {retain_count: retain_count, retention_count: retain_count, base_path: base_path};
    if (autoEl) payload.auto_enabled = !!autoEl.checked;
    if (autoCron) payload.auto_cron = autoCron;
    const body = JSON.stringify(payload);
    let lastErr = null;
    let result = null;

    for (const method of ['POST','PUT','PATCH']) {
      try {
        result = await apiFetch('/api/self-backups/settings', {method, body});
        lastErr = null;
        break;
      } catch (e) {
        lastErr = e;
        if (!/Method Not Allowed/i.test(String(e && e.message || ''))) throw e;
      }
    }

    if (lastErr) throw lastErr;

    var msg = 'System backup settings saved';
    if (result && result.base_path) msg += ' · path: ' + result.base_path;
    if (result && typeof result.deleted_count === 'number') {
      if (result.deleted_count > 0) {
        msg += '. Deleted ' + result.deleted_count + ' old snapshot' + (result.deleted_count === 1 ? '' : 's');

        msg += '. No old snapshots needed removal';
      }
    }

    showToast(msg, 'success');
    try { S.selfbackups = await apiFetch('/api/self-backups'); } catch(e) {}
    try { S.selfbackupSettings = await apiFetch('/api/self-backups/settings'); } catch(e) {}
    render();

async function saveSmtp() {
  if (!licenseFeatureEnabled('notifications.email')) { showToast(licenseFeatureNotice('Email notifications'), 'error'); return; }
  var fromAddress = (document.getElementById('smtp_from')||{}).value || '';
  var starttls = !!(document.getElementById('smtp_tls')||{}).checked;
  var sslTls = !!(document.getElementById('smtp_ssl')||{}).checked;
  var data = {
    host:      (document.getElementById('smtp_host')||{}).value || '',
    port:      parseInt((document.getElementById('smtp_port')||{}).value) || 587,
    username:  (document.getElementById('smtp_user')||{}).value || '',
    password:  (document.getElementById('smtp_pass')||{}).value || '',
    from_addr: fromAddress,
    from_address: fromAddress,
    tls:       starttls,
    starttls:  starttls,
    ssl_tls:   sslTls,
    ssl:       sslTls,
  };
  if (data.ssl_tls) { data.tls = false; data.starttls = false; }
  if (Number(data.port) === 465) { data.ssl_tls = true; data.ssl = true; data.tls = false; data.starttls = false; }
  if (data.ssl_tls) { data.tls = false; data.starttls = false; }
  if (Number(data.port) === 465) {
    data.ssl_tls = true;
    data.ssl = true;
    data.tls = false;
    data.starttls = false;
  }
  try {
    let saved = null;
    let lastErr = null;
    for (const method of ['POST','PUT','PATCH']) {
      try {
        saved = await apiFetch('/api/notifications/smtp', {method, body:JSON.stringify(data)});
        lastErr = null;
        break;
      } catch (e) {
        lastErr = e;
        if (!/Method Not Allowed/i.test(String(e && e.message || ''))) throw e;
      }
    }
    if (lastErr) throw lastErr;
    S.smtpConfig = saved && typeof saved === 'object' ? saved : data;
    window.smtpDirty = false;
    window.smtpEditing = false;
    showToast('SMTP settings saved');

async function doBackup(id) {
  var conn = {};
  try { conn = await apiFetch('/api/connections/' + id); } catch(e) {}

  var retDays = safeInt((conn.retention_days !== undefined && conn.retention_days !== null) ? conn.retention_days : 0, 0);
  var retCount = safeInt((conn.retention_count !== undefined && conn.retention_count !== null) ? conn.retention_count : 0, 0);
  var fnPfx  = conn.filename_prefix || '';
  var destSel = conn.default_destination || 'dbaegis_local';
  if (destSel === '') destSel = 'dbaegis_local';

  function fr2(lbl, inp) {
    return '<div style="margin-bottom:14px"><label style="display:block;font-size:11px;font-weight:400;color:#8896B0;text-transform:none;letter-spacing:.04em;margin-bottom:6px">'+lbl+'</label>'+inp+'</div>';
  }
  function iStyle() { return 'style="background:#131929;border:1px solid #2A3350;border-radius:6px;padding:7px 10px;color:#E2E8F0;font-family:inherit;font-size:13px;width:100%;box-sizing:border-box"'; }
  var selectedBackupType = normalizeBackupType(conn.backup_type || 'logical');
  var productBackupSupported = !!((BACKUP_SUPPORT[selectedBackupType] || {})[normalizeDbType(conn.db_type)]);
  var backupSupported = supportsBackupDb(conn.db_type, selectedBackupType);
  var runDbType = String(conn.db_type||'').toLowerCase();
  var physicalExtraArgs = physicalBackupExtraArgsSupported(runDbType) ? (((conn.physical_options||{}).extra_args) || '') : '';
  var logicalExtraArgs = logicalBackupExtraArgsSupported(runDbType) ? (((conn.logical_options||{}).extra_args) || '') : '';
  var logicalCompressionLevel = normalizeBackupCompressionLevelForDb(runDbType, selectedBackupType, ((conn.logical_options||{}).compression_level) || 'auto');
  var neo4jBackupType = String(((conn.physical_options||{}).neo4j_backup_type) || ((conn.physical_options||{}).neo4j_backup_method) || ((conn.physical_options||{}).physical_backup_method) || 'dump').toLowerCase();
  var neo4jBackupFrom = String(((conn.physical_options||{}).neo4j_backup_from) || ((conn.physical_options||{}).backup_from) || ((conn.physical_options||{}).backup_service_address) || '');
  var mssqlBackupType = normalizeMssqlBackupType(((conn.physical_options||{}).mssql_backup_type) || ((conn.physical_options||{}).sqlserver_backup_type) || (((conn.physical_options||{}).consistency || '').toLowerCase()==='copy-only' ? 'copy_only' : 'full'));
  var oracleRmanBackupType = normalizeOracleRmanBackupType(((conn.physical_options||{}).oracle_rman_backup_type) || ((conn.physical_options||{}).oracle_backup_type) || ((conn.physical_options||{}).rman_backup_type) || (((conn.physical_options||{}).incremental_level) ? (String((conn.physical_options||{}).incremental_level)==='0' ? 'level0' : (String((conn.physical_options||{}).incremental_type||'').toLowerCase()==='cumulative' ? 'level1_cumulative' : 'level1_differential')) : 'full'));
  var couchbaseBackupType = String(((conn.logical_options||{}).couchbase_backup_type) || ((conn.logical_options||{}).cbbackupmgr_backup_type) || (((conn.logical_options||{}).full_backup) ? 'full' : 'incremental')).toLowerCase();
  var allowedTypes = allowedDestTypesForConnection(conn, selectedBackupType);
  var configuredDestinations = filterConfiguredDestinationsForDb(conn.db_type, selectedBackupType);
  function configuredDestType(d) {
    return String((d && (d.dest_type || d.storage_type || d.type)) || '').toLowerCase();
  }
  function configuredDestLabel(d) {
    var dtype = configuredDestType(d);
    var bits = [d.name || d.destination_name || dtype.toUpperCase()];
    var path = d.path_prefix || d.prefix || d.base_path || d.path || d.local_path || d.bucket_name || d.bucket || d.container_name || d.container || d.project_id || '';
    if (path) bits.push(path);
    return bits.join(' · ');
  }
  function storageTypeForDestination(value) {
    value = String(value || '');
    if (!value || value === 'dbaegis' || value === 'dbaegis_local') return 'dbaegis';
    if (value === 'local') return 'dbserver';
    var d = configuredDestinations.find(function(x){ return String(x.id) === value; });
    var dtype = configuredDestType(d);
    return dtype === 'local' ? 'dbaegis' : dtype;
  }
  function destinationOptionsForStorageType(type) {
    if (type === 'dbaegis') {
      var localOpts = [{id:'dbaegis_local', label:'Default DBAegis VM path'}];
      configuredDestinations.filter(function(d){ return configuredDestType(d) === 'local'; }).forEach(function(d){
        localOpts.push({id:String(d.id), label:configuredDestLabel(d)});
      });
      return localOpts;
    }
    if (type === 'dbserver') {

function precheckStatusMeta(status) {
  status = String(status || '').toLowerCase();
  if (status === 'ok') return {label:'OK', color:'#00D97E', bg:'#00D97E18'};
  if (status === 'failed') return {label:'Failed', color:'#FF5A5A', bg:'#FF5A5A18'};
  if (status === 'warning') return {label:'Warning', color:'#F59E0B', bg:'#F59E0B18'};
  if (status === 'running') return {label:'Running', color:'#7DD3FC', bg:'#0EA5E918'};
  if (status === 'skipped') return {label:'Skipped', color:'#8896B0', bg:'#8896B018'};
  return {label:status || 'Unknown', color:'#8896B0', bg:'#8896B018'};
}

function openPrecheckModal(result) {
  result = result || {};
  var overall = precheckStatusMeta(result.status);
  var checks = Array.isArray(result.checks) ? result.checks : [];
  var rows = checks.map(function(ch){
    var meta = precheckStatusMeta(ch.status);
    var detail = ch.detail ? '<div style="font-size:11px;color:#64748B;margin-top:5px;white-space:pre-wrap">'+escHtml(ch.detail)+'</div>' : '';
    return '<div style="display:grid;grid-template-columns:112px 1fr;gap:12px;padding:12px 0;border-top:1px solid #1E2640">'
      + '<div><span style="display:inline-block;min-width:70px;text-align:center;padding:3px 8px;border-radius:999px;background:'+meta.bg+';border:1px solid '+meta.color+'44;color:'+meta.color+';font-size:11px">'+meta.label+'</span></div>'
      + '<div><div style="font-size:13px;color:#E8EEF8">'+escHtml(ch.label || ch.key || 'Check')+'</div>'
      + '<div style="font-size:12px;color:#94A3B8;margin-top:4px;line-height:1.45">'+escHtml(ch.message || '')+'</div>'+detail+'</div>'
      + '</div>';
  }).join('');
  if (!rows) rows = '<div class="empty" style="padding:22px">No preflight checks returned.</div>';
  modal(
    '<div style="width:min(760px,92vw);padding:22px 24px">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px">'
    + '<div><div style="font-size:18px;color:#E8EEF8;font-weight:500">Connection Precheck</div>'
    + '<div style="font-size:12px;color:#94A3B8;margin-top:5px">'+escHtml(result.connection_name || 'Connection')+' · '+escHtml(String(result.db_type || '').toUpperCase())+' · '+escHtml(result.backup_type || 'logical')+'</div></div>'
    + '<div style="display:flex;align-items:center;gap:10px">'
    + '<span style="padding:5px 10px;border-radius:999px;background:'+overall.bg+';border:1px solid '+overall.color+'55;color:'+overall.color+';font-size:12px">'+overall.label+'</span>'
    + '<button class="btn-sm" onclick="closeModal()">Close</button>'
    + '</div></div>'
    + '<div style="font-size:13px;color:#CBD5E1;margin-bottom:8px">'+escHtml(result.summary || '')+'</div>'
    + '<div style="max-height:62vh;overflow:auto">'+rows+'</div>'
    + '</div>'
  );
}

async function doPrecheck(id) {
  var conn = (S.connections || []).find(function(c){ return String(c.id) === String(id); }) || {};
  openPrecheckModal({
    connection_id: id,
    connection_name: conn.name || 'Connection',
    db_type: conn.db_type || '',
    backup_type: conn.backup_type || 'logical',
    status: 'running',
    summary: 'Running preflight checks...',
    checks: [{
      key: 'request',
      label: 'Precheck request',
      status: 'running',
      message: 'Waiting for the DBAegis API to finish connection, SSH, tool, temp path, and safety checks.'
    }]
  });
  try {
    showToast('Running precheck...');
    var r = await apiFetch('/api/connections/' + id + '/precheck', {method:'POST', timeoutMs:120000});
    openPrecheckModal(r);
    showToast('Precheck ' + (r.status || 'completed') + ': ' + (r.summary || ''), r.status === 'failed' ? 'error' : 'success');
  } catch(e) {
    openPrecheckModal({
      connection_id: id,
      connection_name: conn.name || 'Connection',
      db_type: conn.db_type || '',
      backup_type: conn.backup_type || 'logical',
      status: 'failed',
      summary: 'Precheck request failed',
      checks: [{
        key: 'request',
        label: 'Precheck request',
        status: 'failed',
        message: e.message || String(e)
      }]
    });
    showToast('Precheck failed: ' + e.message, 'error');
  }
}

function buildClonedConnectionName(baseName) {
  var original = String(baseName || 'Connection').trim() || 'Connection';
  var existingNames = (S.connections || []).map(function(c){ return String(c.name || '').trim().toLowerCase(); });
  var candidate = original + ' (copy)';
  var idx = 2;
  while (existingNames.indexOf(candidate.toLowerCase()) >= 0) {
    candidate = original + ' (copy ' + idx + ')';
    idx += 1;
  }
  return candidate;
}

function cloneConnectionFormData(src) {
  var clone = JSON.parse(JSON.stringify(src || {}));
  delete clone.id;
  delete clone.connection_id;
  delete clone.status;
  delete clone.created_at;
  delete clone.updated_at;
  delete clone._path;
  delete clone._testing;
  clone.name = buildClonedConnectionName(clone.name);
  clone.password = '';
  clone.has_password = false;
  if (clone.tls_options && typeof clone.tls_options === 'object') {
    clone.tls_options.client_key_password = '';
    clone.tls_options.has_client_key_password = false;
  }
  var cloneSecretKeys = [
    'ssh_password',
    'ssh_key',
    's3_secret',
    'az_conn_str',
    'connection_string',
    'secret_access_key',
    'secret_key',
    'access_key',
    'access_key_id',
    'account_key',
    'sas_token',
    'service_account_json',
    'service_account',
    'client_secret',
    'private_key',
    'api_key',
    'token'
  ];
  cloneSecretKeys.forEach(function(key) {
    clone[key] = '';
    clone['has_' + key] = false;
  });
  ['logical_options', 'physical_options', 'tls_options'].forEach(function(containerKey) {
    var container = clone[containerKey];
    if (!container || typeof container !== 'object') return;
    cloneSecretKeys.forEach(function(key) {
      if (container[key] !== undefined) container[key] = '';
      if (container['has_' + key] !== undefined) container['has_' + key] = false;
    });
  });
  return clone;
}

async function testStorage(id) {
  var dest = (S.storage || []).find(function(d){ return String(d.id) === String(id); }) || {};
  var dtype = String(dest.dest_type || dest.storage_type || dest.type || '').toLowerCase();
  if (!licenseStorageTypeEnabled(dtype)) { showToast(licenseFeatureNotice('Cloud storage destinations'), 'error'); return; }

  try {
    var r = await apiFetch('/api/storage/' + encodeURIComponent(String(id)) + '/test', {method:'POST', timeoutMs:120000});
    setStorageTestResult(id, {pending:false, ok:true, name:dest.name || ((r.storage || {}).name) || ('Storage #' + id), message:r.detail || 'OK', status:r.status || 'ok'});

    showToast('Test failed: ' + e.message, 'error');

  }

async function delStorage(id) {
  var usage = storageUsageInfo(id);
  var dest = (S.storage || []).find(function(d){ return String(d.id) === String(id); }) || {};
  var msg = 'Remove this storage destination?';
  if (usage.total) {
    var lines = [];
    if (usage.connections.length) lines.push('Connections: ' + usage.connections.slice(0,5).map(function(c){ return c.name || ('#'+c.id); }).join(', ') + (usage.connections.length > 5 ? ', ...' : ''));
    if (usage.schedules.length) lines.push('Schedules: ' + usage.schedules.slice(0,5).map(function(s){ return s.connection_name || ('#'+s.id); }).join(', ') + (usage.schedules.length > 5 ? ', ...' : ''));
    if (usage.backups.length) lines.push('Backup records: ' + usage.backups.length);
    msg = 'This destination is still referenced by ' + storageUsageText(usage).replace(/^Used by /, '') + '.\n\n'
      + lines.join('\n')
      + '\n\nRemoving it can break future backups or restores that depend on this destination.\n\nRemove "' + (dest.name || ('Storage #' + id)) + '" anyway?';
  }
  if (!confirm(msg)) return;
  try { await apiFetch('/api/storage/' + encodeURIComponent(String(id)), {method:'DELETE'}); showToast('Removed'); refresh(); }
  catch(e) { showToast('Failed: ' + e.message, 'error'); }
}

      applySshDestinationPreference();
      drawModal();
    };
    window._ac_toggleSSH = function() {
      if (!connectionSupportsSshExecution(form.db_type)) return;
      form.ssh_enabled = !form.ssh_enabled;
      applySshDestinationPreference();
      drawModal();
    };
    window._ac_selDB = function(id) {
      var changed = form.db_type !== id;
      form.db_type = id;
      form.port = DP[id]||'';
      if (changed) {
        form.logical_options = defaultLogicalOptions({});
        form.physical_options = normalizePhysicalOptionsForDb(id, {});
        form.tls_options = defaultTlsOptions({});
      }
      drawModal();

      if (form._testing) return;
      var current = window._ac_form || form;
      var currentPayload = sanitizeConnectionPayload(current);
      if (editMode && existingConn && existingConn.id != null) currentPayload.connection_id = existingConn.id;
      var validationErrors = validateConnectionPayload(currentPayload);
      if (validationErrors.length) { showToast(validationErrors.join('; '), 'error'); return; }
      form._testing = true;
      drawModal();
      try {
        var payload = currentPayload;
        delete payload._testing;
        var res = await apiFetch('/api/connections/test', {method:'POST', body:JSON.stringify(payload)});
        showToast(res.detail || 'Connection test succeeded');
      } catch(e) {
        showToast('Test failed: ' + e.message, 'error');
      } finally {
        form._testing = false;
        drawModal();
      }
    };
    window._ac_save  = async function() {
      try {
        var payload = sanitizeConnectionPayload(window._ac_form);
        if (editMode && existingConn && existingConn.id != null) payload.connection_id = existingConn.id;
        if (!payload.name || !payload.name.trim()) { showToast('Connection name is required.', 'error'); return; }
        var validationErrors = validateConnectionPayload(payload);
        if (validationErrors.length) { showToast(validationErrors.join('; '), 'error'); return; }
        await apiFetch('/api/connections/test', {method:'POST', body:JSON.stringify(payload)});
        delete payload.connection_id;
        if (editMode) {
          // PUT update — allow same name on same connection, block conflict with others
          var nameConflict = S.connections.find(function(c){ return c.id !== existingConn.id && c.name.trim().toLowerCase() === (payload.name||'').trim().toLowerCase(); });
          if (nameConflict) { showToast('Connection name "' + payload.name + '" already exists.', 'error'); return; }
          await saveConnectionWithFallback(payload, existingConn);
          showToast('Connection updated!'); closeModal(); refresh();
        } else {
          // Validate unique name for new connection
          var nameConflict = S.connections.find(function(c){ return c.name.trim().toLowerCase() === (payload.name||'').trim().toLowerCase(); });
          if (nameConflict) { showToast('Connection name "' + payload.name + '" already exists. Please use a unique name.', 'error'); return; }
          await saveConnectionWithFallback(payload, null);
          showToast('Connection added!'); closeModal(); refresh();
        }
      } catch(e) { showToast('Failed: ' + e.message, 'error'); }
    };
  drawModal();
}

function openEditSched(id) {
  if (!licenseFeatureEnabled('schedules')) {
    showToast(licenseFeatureNotice('Schedules'), 'error');
    return;
  }
  var s = S.schedules.find(function(x){ return x.id === id; });
  if (!s) return;
  window._sf = Object.assign({retention_count:0, retention_days:0, logical_options:{}, physical_options:{}}, s, {retention_count: s.retention_count||0, retention_days: s.retention_days||0, logical_options: defaultLogicalOptions(s.logical_options||{}), physical_options: defaultPhysicalOptions(s.physical_options||{})}); window._sf._path='window._sf';
  buildSchedModal(window._sf, true);
  window._sf_redraw = function() { buildSchedModal(window._sf, true); };
  window._sf_save = async function() {
    try {
      // PUT updates all schedule fields
      var payload = {
        connection_id: window._sf.connection_id,
        frequency: window._sf.frequency,
        cron_expr: window._sf.cron_expr,
        destination: window._sf.destination,
        retention_days: window._sf.retention_days || 0,
        retention_count: window._sf.retention_count || 0,
        active: !!window._sf.active,
        backup_path: (window._sf.backup_path || '').replace(/\/+$/, ''),
        logical_options: defaultLogicalOptions(window._sf.logical_options || {}),
        physical_options: defaultPhysicalOptions(window._sf.physical_options || {})
      };
      payload = sanitizeSchedulePayload(payload);
      if (!licenseDestinationEnabled(payload.destination, false)) { showToast(licenseFeatureNotice('Schedule destination'), 'error'); return; }
      await saveScheduleWithFallback('/api/schedules/' + id, 'PUT', payload);
      showToast('Schedule updated!'); closeModal(); refresh();
    } catch(e) { showToast('Failed: ' + e.message, 'error'); }
  };
}

function openStorageConfig(type, editId) {
  var hasEditId = editId !== null && editId !== undefined && String(editId) !== '';
  if (!hasEditId && !licenseStorageTypeEnabled(type)) {
    showToast(licenseFeatureNotice('Cloud storage destinations'), 'error');
    return;
  }
  var existing = hasEditId ? (S.storage||[]).find(function(d){return String(d.id)===String(editId);}) : null;
  var existCfg = existing ? safeJsonObj(existing.config) : {};

function openRestore(bid) {
  var b = S.backups.find(function(x){return x.id===bid;});
  var c = b ? S.connections.find(function(x){return x.id===b.connection_id;}) : null;
  var step = 1; window._rt = b ? b.connection_id : 1; window._ro = false;

  function drawRestore() {
    var dots = ['Select','Configure','Confirm'].map(function(s, i) {
      var past = step > i+1; var curr = step === i+1;
      return '<div style="display:flex;align-items:center;' + (i<2?'flex:1':'') + '">'
        + '<div style="display:flex;align-items:center;gap:8px">'
        + '<div style="width:26px;height:26px;border-radius:50%;background:' + (past?'#00D97E':curr?'#4E9FFF':'#1E2640') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:400">' + (past?'✓':i+1) + '</div>'
        + '<span style="font-size:12px;color:' + (curr?'#E2E8F0':'#4E5A78') + ';white-space:nowrap">' + s + '</span></div>'
        + (i<2 ? '<div style="flex:1;height:1px;background:' + (past?'#00D97E44':'#1E2640') + ';margin:0 12px"></div>' : '')
        + '</div>';
    }).join('');

    var sz = b && b.size_bytes ? (b.size_bytes/1024/1024).toFixed(1)+' MB' : '—';
    var connOpts = S.connections.map(function(cn){ return '<option value="' + cn.id + '">' + escHtml(cn.name || '') + '</option>'; }).join('');

    var bodies = [
      '<div style="background:#0B0E17;border:1px solid #1E2640;border-radius:10px;padding:16px;margin-bottom:20px">'
        + '<div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">' + dicon(c&&c.db_type, 28) + '</span>'
        + '<div><div style="font-weight:400">' + escHtml(c ? c.name : '#'+b.connection_id) + '</div>'
        + '<div style="font-size:12px;color:#4E5A78">' + (b ? fmtDT(b.started_at||'') : '') + ' · ' + sz + '</div></div></div></div>'
        + '<button class="btn btn-primary" style="width:100%;padding:10px" onclick="window._r_step(2)">Continue →</button>',
      frow('Restore Target', '<select onchange="window._rt=parseInt(this.value)">' + connOpts + '</select>')
        + '<label style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0B0E17;border:1px solid #1E2640;border-radius:8px;cursor:pointer;font-size:13px;color:#8896B0;margin-bottom:20px">'
        + '<input type="checkbox" onchange="window._ro=this.checked" style="accent-color:#FF5A5A"/> Overwrite existing data</label>'
        + '<div style="display:flex;gap:10px"><button onclick="window._r_step(1)" style="flex:1;padding:10px;background:#1E2640;color:#8896B0;border:none;border-radius:8px;cursor:pointer;font-family:inherit">← Back</button>'
        + '<button onclick="window._r_step(3)" style="flex:2;padding:10px;background:#4E9FFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit">Continue →</button></div>',
      '<div style="background:#FF5A5A18;border:1px solid #FF5A5A44;border-radius:10px;padding:14px 16px;margin-bottom:20px">'
        + '<div style="color:#FF5A5A;font-weight:400;font-size:14px;margin-bottom:6px">⚠ Confirm Restore</div>'
        + '<div style="font-size:13px;color:#8896B0">Restoring backup #' + (b?b.id:'?') + '. This action cannot be undone.</div></div>'
        + '<div style="display:flex;gap:10px"><button onclick="window._r_step(2)" style="flex:1;padding:10px;background:#1E2640;color:#8896B0;border:none;border-radius:8px;cursor:pointer;font-family:inherit">← Back</button>'
        + '<button onclick="window._r_do()" style="flex:2;padding:10px;background:#00D97E;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:400">↩ Restore Now</button></div>',
    ];

    document.getElementById('modals').innerHTML =
      '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
      + '<div class="modal">'
      + '<div style="padding:20px 24px;border-bottom:1px solid #1E2640;display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-weight:400;font-size:15px">Restore Backup</span>'
      + '<button onclick="closeModal()" style="background:none;border:none;color:#4E5A78;cursor:pointer;font-size:20px;font-family:inherit">×</button></div>'
      + '<div style="padding:22px 24px">'
      + '<div style="display:flex;align-items:center;margin-bottom:24px">' + dots + '</div>'
      + bodies[step-1] + '</div></div></div>';
  }

  window._r_step = function(s) { step = s; drawRestore(); };
  window._r_do   = async function() {
    try {
      var restoreMode = _backupRestoreMode(b, (c || {}).db_type);
      var payload = {backup_id:b.id, target_connection_id:window._rt, restore_mode:restoreMode, overwrite:window._ro, overwrite_existing:window._ro};
      if (!validateRestoreStartPayload(payload)) return;
      payload = await prepareRestoreStartPayload(payload);
      var resp = await apiFetch('/api/restore/', {method:'POST', body:JSON.stringify(payload)});
      showToast((resp && resp.message) || 'Restore started!');
      closeModal();
      await refresh();
    } catch(e) {
      if (String(e && e.message || e) === 'Restore cancelled') return;
      showToast('Restore failed: ' + e.message, 'error');
    }
  };
  drawRestore();
}

function fmtDT(rawStr) {
  if (!rawStr) return '--';
  var s = String(rawStr).trim();
  var d = parseApiDateLocal(s);
  if (!d) return s.slice(0, 16);
  var pad = function(n){ return n < 10 ? '0' + n : n; };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function qbPinnedConnections() {
  var pins = (S.pinnedQB || []).map(function(id){ return String(id); });
  return (S.connections || []).filter(function(c){ return pins.indexOf(String(c.id)) >= 0; });
}

function qbIsSelected(id) {
  var selected = S.qbSelected || {};
  var key = String(id);
  if (Object.prototype.hasOwnProperty.call(selected, key)) return !!selected[key];
  return true;
}

function qbSelectedPinnedIds() {
  return qbPinnedConnections().filter(function(c){ return qbIsSelected(c.id); }).map(function(c){ return String(c.id); });
}

function qbSetPinnedSelection(checked) {
  S.qbSelected = S.qbSelected || {};
  qbPinnedConnections().forEach(function(c){ S.qbSelected[String(c.id)] = !!checked; });
  render();
}

function quickBackupDestinationValue(conn) {
  var value = String((conn && conn.default_destination) || (conn && conn.destination) || '').trim();
  return value || 'dbaegis_local';
}

function quickBackupDestinationLabel(conn) {
  var value = quickBackupDestinationValue(conn);
  if (value === 'dbaegis' || value === 'dbaegis_local') return 'DBAegis VM';
  if (value === 'local') return 'DB server';
  var dest = (S.storage || []).find(function(d){ return String(d.id) === String(value); });
  if (!dest) return value;
  var type = String(dest.dest_type || dest.storage_type || dest.type || '').toUpperCase();
  return (dest.name || dest.destination_name || type || value);
}

function qbToggle(id, checked) {
  if (!S.qbSelected) S.qbSelected = {};
  S.qbSelected[String(id)] = checked;
  render();
}
function qbSelectAll() {
  qbSetPinnedSelection(true);
}
function qbSelectNone() {
  qbSetPinnedSelection(false);
}
async function qbRunSelected() {
  var ids = qbSelectedPinnedIds();
  if (!ids.length) { showToast('Select at least one database', 'error'); return; }

  // Show a live progress panel
  var C = S.connections;
  var progressItems = ids.map(function(id) {
    var conn = C.find(function(c){ return String(c.id) === String(id); }) || {};
    return {
      id: id,
      name: conn.name || ('#'+id),
      db_type: conn.db_type || '',
      destination: quickBackupDestinationValue(conn),
      destination_label: quickBackupDestinationLabel(conn),
      status: 'pending',
      backupId: null,
      error: ''
    };
  });

  function renderQBProgress() {
    var rows = progressItems.map(function(p) {
      var dot = p.status === 'running'  ? '<span style="color:#4E9FFF;animation:pulse 1s infinite">running</span>'
               : p.status === 'done'    ? '<span style="color:#00D97E">done</span>'
               : p.status === 'failed'  ? '<span style="color:#FF5A5A">failed</span>'
               :                          '<span style="color:#4E5A78">pending</span>';
      var logBtn = (p.status === 'done' || p.status === 'failed') && p.backupId
        ? '<button onclick="viewRuntimeLog(&apos;backup&apos;,'+p.backupId+')" style="background:#4E9FFF22;border:1px solid #4E9FFF44;color:#4E9FFF;padding:2px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;margin-left:8px">Log</button>'
        : '';
      var statusColor = p.status === 'done' ? '#00D97E' : p.status === 'failed' ? '#FF5A5A' : p.status === 'running' ? '#4E9FFF' : '#4E5A78';
      return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #1A2235">'
        + '<span style="font-size:14px">' + dot + '</span>'
        + '<div style="flex:1;min-width:0">'
        + '<div title="' + escHtml(p.name || '') + '" style="font-size:12px;color:#E2E8F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escHtml(p.name) + '</div>'
        + '<div style="font-size:10px;color:#4E5A78">' + escHtml(String(p.db_type||'').toUpperCase()) + ' · ' + escHtml(p.destination_label) + ' · <span style="color:'+statusColor+'">' + escHtml(String(p.status||'').toUpperCase()) + '</span></div>'
        + (p.error ? '<div title="'+escHtml(p.error)+'" style="font-size:10px;color:#FF5A5A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(p.error)+'</div>' : '')
        + '</div>' + logBtn + '</div>';
    }).join('');

    var allDone = progressItems.every(function(p){ return p.status === 'done' || p.status === 'failed'; });
    var doneBtn = allDone
      ? '<button onclick="closeModal();S.qbSelected={};render()" style="width:100%;margin-top:12px;padding:8px;background:#1E2640;border:1px solid #2A3350;border-radius:8px;color:#94A3B8;font-size:12px;cursor:pointer;font-family:inherit">Close</button>'
      : '';

    document.getElementById('modals').innerHTML =
      '<div class="modal-overlay">'
      + '<div class="modal" style="max-width:400px">'
      + '<div style="padding:16px 20px;border-bottom:1px solid #1E2640;display:flex;align-items:center;gap:10px">'
      + uiIcon('test',16)
      + '<div><div style="font-size:14px;font-weight:500">Quick Backup Running</div>'
      + '<div style="font-size:11px;color:#4E5A78;margin-top:1px">'+ids.length+' database'+(ids.length!==1?'s':'')+' queued</div></div>'
      + '</div>'
      + '<div style="padding:14px 20px">' + rows + doneBtn + '</div>'
      + '</div></div>';
  }

  renderQBProgress();

  var nextIndex = 0;
  var concurrency = Math.min(3, progressItems.length);
  async function runNextQuickBackup() {
    var p = progressItems[nextIndex++];
    if (!p) return;
    p.status = 'running';
    renderQBProgress();
    try {
      var backupPayload = {connection_id: parseInt(p.id, 10), destination: p.destination};
      var backupConn = (S.connections || []).find(function(c){ return String(c.id) === String(p.id); }) || {};
      var validationErrors = backupStartRequiredFieldErrors(backupConn, backupPayload);
      if (validationErrors.length) {
        p.status = 'failed';
        p.error = validationErrors.slice(0, 3).join('; ') + (validationErrors.length > 3 ? '; ...' : '');
        renderQBProgress();
        await runNextQuickBackup();
        return;
      }
      var data = await apiFetch('/api/backups/', {
        method: 'POST',
        body: JSON.stringify(backupPayload)
      });
      p.status = 'done';
      p.backupId = data && (data.id || data.backup_id);
    } catch(e) {
      p.status = 'failed';
      p.error = String((e && e.message) || e || 'Backup failed');
    }
    renderQBProgress();
    await runNextQuickBackup();
  }

  Promise.all(Array.from({length: concurrency}, runNextQuickBackup)).then(function() {
    S.qbSelected = {};
    setTimeout(refresh, 1000);
  });
}

function _backupRestoreMode(backup, dbType) {
  var bt = String((backup && backup.backup_type) || '').toLowerCase();
  if (bt === 'logical' || bt === 'physical') return bt;
  return _detectRestoreMode(backup, dbType);
}

function _detectRestoreMode(backup, dbType) {
  backup = backup || {};
  var fp = String(backup.file_path || backup.target_uri || backup.source_path || backup.path || backup.name || '').toLowerCase();
  var db = normalizeDbType(dbType || backup.db_type || backup.database_type || backup.type || '');
  if (fp.includes('_physical_') || fp.includes('physical_')) return 'physical';
  if (fp.endsWith('.rdb') || fp.endsWith('.aof') || fp.endsWith('.bak') || fp.endsWith('.rman')) return 'physical';
  if ((fp.endsWith('.tar') || fp.endsWith('.tar.gz') || fp.endsWith('.tgz')) &&
      ['postgresql','mysql','mariadb','mongodb','redis','sqlite','cassandra','neo4j','mssql'].indexOf(db) >= 0) return 'physical';
  if ((fp.endsWith('.dump') || fp.endsWith('.backup')) && db === 'neo4j') return 'physical';
  if (fp.endsWith('.db') || fp.endsWith('.sqlite') || fp.endsWith('.sqlite3')) return 'physical';
  return 'logical';
}

async function loadDiscoveredRestoreBackups(force) {
  var rst = window._rst || {};
  var connId = rst.custom_conn_id || rst.conn_id || '';
  var conn = (S.connections || []).find(function(c){ return String(c.id) === String(connId); }) || {};
  var dbType = normalizeDbType(conn.db_type || '');
  var key = String(connId) + ':' + dbType;
  if (!force && rst.discovered_key === key && (rst.discovered_files || []).length) return;
  rst.active_tab = 'custom';
  rst.discovered_key = key;
  rst.discovered_loading = true;
  rst.discovered_error = '';
  if (window._rebuildRestoreModal) window._rebuildRestoreModal();
  try {
    var data = await apiFetch('/api/restore/discovered-backups?connection_id=' + encodeURIComponent(connId) + '&db_type=' + encodeURIComponent(dbType));
    rst.discovered_files = (data && data.items) || [];
  } catch(e) {
    rst.discovered_files = [];
    rst.discovered_error = e.message || String(e);
  } finally {
    rst.discovered_loading = false;
    if (window._rebuildRestoreModal) window._rebuildRestoreModal();
  }
}

  rst.custom_mode = item.restore_mode || rst.custom_mode || _detectRestoreMode({file_path: rst.custom_path}, conn.db_type);
  rst.custom_options = {};

function openRestoreModal(backupId, connId) {
  var C = S.connections;
  var B = S.backups.filter(function(b){ return dashboardIsSuccessStatus(b.status); });
  var selConn = connId || (backupId ? ((B.find(function(b){return b.id===backupId;})||{}).connection_id) : null) || ((C[0]||{}).id);
  var selBackup = backupId || ((B.filter(function(b){return b.connection_id===selConn;})[0]||{}).id) || '';

  // Bootstrap the _rf state so renderDbSpecificRestoreOptions works
  var initBackup = B.find(function(b){ return b.id===selBackup; }) || {};
  var initConn   = C.find(function(c){ return c.id===selConn; }) || C[0] || {};
  var initMode   = _backupRestoreMode(initBackup, initConn.db_type);

  window._rst = {
    conn_id:         selConn,
    backup_id:       selBackup,
    mode:            initMode,
    overwrite:       false,
    options:         {},
    custom_conn_id:  selConn,
    custom_mode:     null,
    custom_path:     '',
    custom_source_storage_id: '',
    custom_source_storage_type: '',
    custom_overwrite: false,
    custom_options:  {},
    active_tab:      'catalog',
    discovered_files: [],
    discovered_key:  '',
    discovered_loading: false,
    discovered_error: ''
  };

  // Mirror into _rf so renderDbSpecificRestoreOptions reads correctly
  window._rf = window._rf || {};
  window._rf.db_type       = ((initConn.db_type || '') + '').toLowerCase();
  window._rf.restore_mode  = initMode;
  window._rf.options       = {};

  function buildModal() {
    var curConnId = window._rst.conn_id;
    var curConn   = C.find(function(c){ return String(c.id) === String(curConnId); }) || C[0] || {};
    var dbType    = ((curConn.db_type || '') + '').toLowerCase();
    var curMode   = normalizeRestoreModeForDb(dbType, window._rst.mode || 'logical');
    window._rst.mode = curMode;
    var catalogConnections = C.filter(function(c){
      return supportsRestoreDb(c.db_type) && connectionConfiguredForRestoreMode(c, curMode);
    });
    if (!catalogConnections.some(function(c){ return String(c.id) === String(curConnId); })) {
      curConn = catalogConnections[0] || {};
      curConnId = curConn.id || '';
      window._rst.conn_id = curConnId;
      dbType = normalizeDbType(curConn.db_type || dbType);
      curMode = normalizeRestoreModeForDb(dbType, curMode);
      window._rst.mode = curMode;
    }
    var curBkid   = window._rst.backup_id;
    var curBackups = B.filter(function(b){
      return String(b.connection_id) === String(curConnId)
        && _backupRestoreMode(b, dbType) === curMode;
    });
    if (!curBackups.some(function(b){ return String(b.id) === String(curBkid); })) {
      curBkid = curBackups.length ? curBackups[0].id : '';
      window._rst.backup_id = curBkid;
    }
    var curBk = curBackups.find(function(b){ return String(b.id) === String(curBkid); }) || {};

    // Update _rf for renderDbSpecificRestoreOptions
    window._rf.db_type      = dbType;
    window._rf.restore_mode = curMode;
    window._rf.options      = window._rst.options || {};

    // Build connection options fresh every render so selected reflects current state
    var connOpts = catalogConnections.length
      ? catalogConnections.map(function(c){
          return '<option value="'+c.id+'"'+(String(c.id)===String(curConnId)?' selected':'')+'>'+escHtml(di(c.db_type))+' '+escHtml(c.name)+' ('+escHtml(normalizeBackupType(c.backup_type || 'logical'))+')</option>';
        }).join('')
      : '<option value="">No configured connections for selected restore type</option>';

    // Build backup list filtered by current connection
    var curBkOpts = curBackups.map(function(b){
      var sz = b.size_bytes ? (b.size_bytes/1024/1024).toFixed(1)+'MB' : '?';
      var fp = b.file_path ? String(b.file_path).split('/').pop() : 'unknown';
      return '<option value="'+b.id+'"'+(String(b.id)===String(curBkid)?' selected':'')+'>'+escHtml(fmtDT(b.started_at))+' - '+escHtml(fp)+' ('+escHtml(sz)+')</option>';
    }).join('') || '<option value="">No successful backups</option>';

    var fp = curBk.file_path || '';
    var previewHtml = fp
      ? '<div style="font-size:10px;color:#4E5A78;margin-bottom:2px">FILE</div>'
        + '<div style="font-size:12px;color:#4E9FFF;word-break:break-all">'+escHtml(fp)+'</div>'
        + '<div style="font-size:10px;color:#4E5A78;margin-top:4px">'+(curBk.size_bytes?(curBk.size_bytes/1024/1024).toFixed(2)+' MB — ':'')+fmtDT(curBk.started_at)+'</div>'
      : '<span style="font-size:11px;color:#4E5A78">Select a backup above</span>';

	    // Mode selector: lock to detected mode when a backup file is selected
	    var supportedModes = restoreModesForDb(dbType);
	    if (supportedModes.indexOf(curMode) < 0) {
	      curMode = supportedModes[0] || 'logical';
	      window._rst.mode = curMode;
	    }
	    window._rf.restore_mode = curMode;
	    var modeSelector = supportedModes.length <= 1
	      ? '<div style="font-size:12px;color:#94A3B8;padding:8px 10px;background:#0B0E17;border:1px solid #2A3350;border-radius:8px">'+escHtml(restoreModeLabel(supportedModes[0] || 'logical'))+' only for '+escHtml(String(dbType).toUpperCase())+'</div>'
	      : '<div style="display:flex;gap:8px">'
	        + supportedModes.map(function(m){
            var active   = curMode === m;

function updateRestoreBackups() {
  var connSel = document.getElementById('rst-conn');
  var backupSel = document.getElementById('rst-backup');
  if (!connSel || !backupSel) return;
  var cid = parseInt(connSel.value);
  var B = S.backups.filter(function(b){ return dashboardIsSuccessStatus(b.status) && b.connection_id===cid; });
  backupSel.innerHTML = B.map(function(b){
    var sz = b.size_bytes ? (b.size_bytes/1024/1024).toFixed(1)+'MB' : '?';
    var fp = b.file_path ? b.file_path.split('/').pop() : 'unknown';
    return '<option value="'+escHtml(b.id)+'">'+escHtml(fmtDT(b.started_at))+' - '+escHtml(fp)+' ('+escHtml(sz)+')</option>';
  }).join('') || '<option value="">No successful backups</option>';

async function doRestoreSubmit_catalog() {
  var rst = window._rst || {};
  var connId   = parseInt(rst.conn_id) || rst.conn_id;
  var backupId = parseInt(rst.backup_id) || rst.backup_id;
  var overwrite = !!(document.getElementById('rst-overwrite') || {}).checked;
  if (!backupId || isNaN(Number(backupId))) { showToast('Select a backup first', 'error'); return; }
  var catalogConn = S.connections.find(function(c){return String(c.id)===String(connId);}) || {};
  var catalogDbType = normalizeDbType(catalogConn.db_type || '');
  if (!licenseDatabaseEnabled(catalogDbType)) { showToast(licenseFeatureNotice(dn(catalogDbType)), 'error'); return; }
  if (!licenseRestoreModeEnabled(rst.mode || 'logical')) { showToast(licenseFeatureNotice('Physical restores'), 'error'); return; }
  var cname = catalogConn.name || 'connection';
  var payload = {
    backup_id:            backupId,
    target_connection_id: connId,
    overwrite:            overwrite,
    overwrite_existing:   overwrite,
    target_name:          (((document.getElementById('rst-target-db')||{}).value) || rst.target_name || '').trim(),
    create_if_missing:    !!((document.getElementById('rst-create-db')||{}).checked),
    dry_run:              false,
    verify_after_restore: true,
    restore_mode:         rst.mode || 'logical',
    options:              window._rf ? (window._rf.options || {}) : {}
  };
  if (!validateRestoreStartPayload(payload)) return;
  if (!confirm('Restore to ' + cname + '? This will modify the target database.')) return;
  try {
    payload = await prepareRestoreStartPayload(payload);
    var resp = await apiFetch('/api/restore/', {method:'POST', body:JSON.stringify(payload)});
    var jobId = resp && (resp.id || resp.job_id || resp.restore_id);
    closeModal();
    if (jobId) {
      showToast('Restore started — opening log…');
      await new Promise(function(res){ setTimeout(res, 400); });
      viewRuntimeLog('restore', jobId);
    } else {
      showToast('Restore started');
      setTimeout(refresh, 1500);
    }
  } catch(e) {
    if (String(e && e.message || e) === 'Restore cancelled') return;
    showToast('Restore failed: '+(e.message||e), 'error');
  }
}

async function doRestoreSubmit_custom() {
  var rst      = window._rst || {};
  var connId   = parseInt(rst.custom_conn_id) || parseInt((document.getElementById('rst-conn-custom')||{}).value);
  var filePath = (rst.custom_path || ((document.getElementById('rst-custom-path')||{}).value) || '').trim();
  var sourceStorageId = String(rst.custom_source_storage_id || ((rst.custom_options || {}).source_storage_id) || '').trim();
  var overwrite = !!(rst.custom_overwrite || ((document.getElementById('rst-overwrite-custom')||{}).checked));
  if (!filePath) { showToast('Enter a file path', 'error'); return; }
  var targetConn = S.connections.find(function(c){ return String(c.id)===String(connId); }) || {};
  var restoreMode = rst.custom_mode || _detectRestoreMode({file_path:filePath}, targetConn.db_type) || 'logical';
  var customDbType = normalizeDbType(targetConn.db_type || '');
  if (!licenseDatabaseEnabled(customDbType)) { showToast(licenseFeatureNotice(dn(customDbType)), 'error'); return; }
  if (!licenseRestoreModeEnabled(restoreMode)) { showToast(licenseFeatureNotice('Physical restores'), 'error'); return; }
  if (isRestoreCloudSourcePath(filePath) && !licenseFeatureEnabled('restores.cloud')) { showToast(licenseFeatureNotice('Cloud restores'), 'error'); return; }
  if (isRestoreCloudSourcePath(filePath) && !sourceStorageId) { showToast('Cloud storage location is required for cloud restores', 'error'); return; }
  var cname = targetConn.name || 'connection';
  var customOptions = Object.assign({}, rst.custom_options || {});
  if (sourceStorageId) customOptions.source_storage_id = sourceStorageId;
  var payload = {
    target_connection_id: connId,
    custom_file_path:     filePath,
    source_storage_id:    sourceStorageId,
    overwrite:            overwrite,
    overwrite_existing:   overwrite,
    target_name:          (((document.getElementById('rst-target-db-custom')||{}).value) || rst.target_name || '').trim(),
    create_if_missing:    !!((document.getElementById('rst-create-db-custom')||{}).checked),
    dry_run:              false,
    verify_after_restore: true,
    restore_mode:         restoreMode,
    options:              customOptions
  };
  if (!validateRestoreStartPayload(payload)) return;
  if (!confirm('Restore from '+filePath+' to '+cname+'? This will modify the target database.')) return;
  try {
    payload = await prepareRestoreStartPayload(payload);
    var resp = await apiFetch('/api/restore/', {method:'POST', body:JSON.stringify(payload)});
    var jobId = resp && (resp.id || resp.job_id || resp.restore_id);
    closeModal();
    if (jobId) {
      showToast('Restore started — opening log…');
      await new Promise(function(res){ setTimeout(res, 400); });
      viewRuntimeLog('restore', jobId);
    } else {
      showToast('Restore started');
      setTimeout(refresh, 1500);
    }
  } catch(e) {
    if (String(e && e.message || e) === 'Restore cancelled') return;
    showToast('Restore failed: '+(e.message||e), 'error');
  }
}

async function viewRuntimeLog(type, id) {
  if (window._logPoller) { clearInterval(window._logPoller); window._logPoller = null; }

  var panel = _ensureLogPanel();
  panel.style.display = 'flex';

  var title = document.getElementById('_vlp_title');
  var meta  = document.getElementById('_vlp_meta');
  var logEl = document.getElementById('_vlp_log');
  var indic = document.getElementById('_vlp_indicator');
  var label = type === 'restore' ? 'Restore' : 'Backup';

  if (title) title.textContent = label + ' #' + id + ' — Runtime Log';
  if (logEl) logEl.textContent = 'Loading...';

  var apiPath = type === 'restore'
    ? '/api/restore/jobs/' + id + '/log'
    : '/api/backups/' + id + '/log';

  async function poll() {
    try {
      var r = await apiFetch(apiPath);

      var log = '';
      if (type === 'restore') {
        log = r.log || r.restore_log || r.message || '';
      } else {
        log = r.log || r.engine_log || r.backup_log || r.message || '';
        if (!log) {
          var parts = [];
          if (r.command_text) parts.push('Command:\n' + r.command_text);
          if (r.stdout_log)   parts.push('STDOUT:\n' + r.stdout_log);
          if (r.stderr_log)   parts.push('STDERR:\n' + r.stderr_log);
          if (r.exit_code !== undefined && r.exit_code !== null) parts.push('Exit code: ' + r.exit_code);
          log = parts.join('\n\n');
        }
      }

      var status = String(r.status || '').toLowerCase();
      var running = dashboardIsRunningStatus(status) || dashboardIsPendingStatus(status);

      if (indic) {
        indic.style.background =
          dashboardIsSuccessStatus(status) ? '#00D97E' :
          dashboardIsFailureStatus(status) ? '#FF5A5A' :
          running ? '#4E9FFF' : '#FFB900';
        indic.style.boxShadow = running ? '0 0 8px #4E9FFF' : 'none';
        indic.style.animation = running ? 'pulse 1s infinite' : 'none';
      }

      if (meta) {
        var metaParts = ['Status: ' + (status || '—')];
        if (r.file_path)    metaParts.push('File: ' + r.file_path);
        if (r.source_path)  metaParts.push('Source: ' + r.source_path);
        if (r.duration_sec) metaParts.push('Duration: ' + Number(r.duration_sec).toFixed(2) + 's');
        if (r.size_bytes)   metaParts.push('Size: ' + (r.size_bytes/1024/1024).toFixed(2) + ' MB');
        meta.textContent = metaParts.join('  |  ');
      }

      if (logEl) {
        logEl.textContent = log || '(no log output yet)';
      }

      if (!running && window._logPoller) {
        clearInterval(window._logPoller);
        window._logPoller = null;
      }
    } catch (e) {
      if (logEl) logEl.textContent = '⚠ Failed to fetch log: ' + (e.message || e);
      if (window._logPoller) {
        clearInterval(window._logPoller);
        window._logPoller = null;
      }
    }
  }

  await poll();
  window._logPoller = setInterval(poll, 1500);
}

viewRuntimeLog._copyLog = function() {
  var logEl = document.getElementById('_vlp_log');
  var text = logEl ? logEl.textContent : '';

function normalizeAuthUserPayload(payload) {
  if (!payload || typeof payload !== 'object') return null;
  var user = payload.user && typeof payload.user === 'object' ? Object.assign({}, payload.user) : Object.assign({}, payload);
  if (!user.csrf_token && payload.csrf_token) user.csrf_token = payload.csrf_token;
  if (!user.username && payload.username) user.username = payload.username;
  if (!user.role && payload.role) user.role = payload.role;
  if (!Array.isArray(user.permissions) && Array.isArray(payload.permissions)) user.permissions = payload.permissions;
  if (!Array.isArray(user.connection_ids) && Array.isArray(payload.connection_ids)) user.connection_ids = payload.connection_ids;
  if (!Array.isArray(user.connection_tags) && Array.isArray(payload.connection_tags)) user.connection_tags = payload.connection_tags;
  return user.username ? user : null;
}

function authIsAdmin(){ return !!(AUTH.user && AUTH.user.role === 'admin'); }
function authIsReadOnly(){ return !!(AUTH.user && AUTH.user.role === 'read_only'); }
function authUserConnectionTags(){
  return normalizeTagString((AUTH.user && AUTH.user.connection_tags) || '').split(',').map(function(t){ return t.trim().toLowerCase(); }).filter(Boolean);
}
function authConnectionAllowedByTag(connectionId){
  var allowedTags = authUserConnectionTags();
  if (!allowedTags.length) return false;
  var conn = (S.connections || []).find(function(c){ return String(c.id) === String(connectionId); });
  if (!conn) return false;
  var tags = connectionTags(conn).map(function(t){ return t.toLowerCase(); });
  return allowedTags.some(function(t){ return tags.indexOf(t) >= 0; });
}
function authHasPermission(permission, connectionId){
  if (!AUTH.user) return false;
  if (authIsAdmin()) return true;
  var perms = Array.isArray(AUTH.user.permissions) ? AUTH.user.permissions : [];
  if (perms.indexOf('*') >= 0 || perms.indexOf(permission) >= 0) {
    if (connectionId == null || connectionId === '') return true;
    if (AUTH.user.role === 'read_only' && ['connections:view','backups:view','restores:view'].indexOf(permission) >= 0) return true;
    var ids = Array.isArray(AUTH.user.connection_ids) ? AUTH.user.connection_ids.map(String) : [];
    return ids.indexOf(String(connectionId)) >= 0 || authConnectionAllowedByTag(connectionId);
  }
  return false;
}

function authEscape(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')

}
