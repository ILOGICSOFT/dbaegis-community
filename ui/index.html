async function licenseCheck(force){
  if (!force && LICENSE.ready) return LICENSE.status;
  try {
    var r = await fetch(API + '/api/license/status', { credentials:'same-origin' });
    var data = await r.json();
    if (!r.ok) throw new Error(data && data.detail ? data.detail : 'License check failed');
    LICENSE.status = data || {};
    LICENSE.ready = true;
    scheduleLicenseExpiryRefresh();
    return LICENSE.status;
  } catch (e) {
    LICENSE.status = {
      required: true,
      valid: false,
      status: 'unavailable',
      message: String((e && e.message) || e || 'License status unavailable')
    };
    LICENSE.ready = true;
    scheduleLicenseExpiryRefresh();
    return LICENSE.status;
  }
}

var _origApiFetch = apiFetch;
apiFetch = async function(path, opts){

    return await _origApiFetch(path, opts);

    var msg = String((e && e.message) || e || '');
    if (/License validation failed|license required|license is invalid/i.test(msg)) {
      LICENSE.ready = true;
      LICENSE.status = {required:true, valid:false, status:'invalid', message:msg};
      if (typeof render === 'function') render();
    }

      AUTH.user = null;
      AUTH.ready = true;
      render();

async function doLogin(){
  if (AUTH.mfa && AUTH.mfa.mfa_token) {
    var c = document.getElementById('login_mfa_code');
    var e2 = document.getElementById('login_error');
    var code = c ? String(c.value || '').trim() : '';
    if (!code) {
      if (e2) e2.textContent = 'Microsoft Authenticator code is required';
      return;
    }
    if (e2) e2.textContent = 'Verifying code...';
    try {
      var rr = await fetch(API + '/api/auth/login', {
        method:'POST',
        credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mfa_token:AUTH.mfa.mfa_token, mfa_code:code})
      });
      var dd = await rr.json();
      if (!rr.ok) throw new Error(dd && dd.detail ? dd.detail : 'MFA verification failed');
      AUTH.mfa = null;
      AUTH.user = normalizeAuthUserPayload(dd);
      AUTH.ready = true;
      await authLoadUsers();
      authHideOverlay();
      showToast('Logged in as ' + ((AUTH.user && AUTH.user.username) || ''), 'success');
      await refresh();
      render();
    } catch (err2) {
      if (e2) e2.textContent = String((err2 && err2.message) || err2 || 'MFA verification failed');
    }
    return;
  }
  var u = document.getElementById('login_username');
  var p = document.getElementById('login_password');
  var e = document.getElementById('login_error');
  var username = u ? String(u.value || '').trim() : '';
  var password = p ? String(p.value || '') : '';
  if (!username || !password) {
    if (e) e.textContent = 'Username and password are required';
    return;
  }
  if (e) e.textContent = 'Signing in...';
  try {
    var r = await fetch(API + '/api/auth/login', {
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:username, password:password})
    });
    var data = await r.json();
    if (!r.ok) throw new Error(data && data.detail ? data.detail : 'Login failed');
    if (data && data.mfa_required) {
      AUTH.mfa = data;
      AUTH.user = null;
      AUTH.ready = true;
      authLoginOverlay('Microsoft Authenticator code is required');
      return;
    }
    AUTH.mfa = null;
    AUTH.user = normalizeAuthUserPayload(data);
    AUTH.ready = true;
    await authLoadUsers();
    authHideOverlay();
    showToast('Logged in as ' + ((AUTH.user && AUTH.user.username) || username), 'success');
    await refresh();
    render();
  } catch (err) {
    if (e) e.textContent = String((err && err.message) || err || 'Login failed');
  }
}

function authRoleScopeHtml(role, connIds, connTags, connById){

    seen[key] = true;
    return true;
  });

function authRenderLdapTestResult(ok, msg, detail){
  try { localStorage.setItem('dbaegis_ldap_test_result', JSON.stringify({ok:!!ok, message:String(msg || ''), detail:String(detail || ''), checked_at:new Date().toISOString()})); } catch(e) {}
  var el = document.getElementById('ldap_test_result');
  if (!el) return;
  var tone = ok
    ? 'background:#00D97E12;border:1px solid #00D97E33;color:#B6F7D2'
    : 'background:#FF5A5A12;border:1px solid #FF5A5A33;color:#FFD5D5';
  var body = authEscape(String(msg || ''));
  if (detail) body += '<div style="margin-top:6px;color:#9fb3d9">' + authEscape(String(detail)) + '</div>';
  el.style.cssText = 'grid-column:1 / -1;border-radius:12px;padding:10px 12px;font-size:12px;' + tone;
  el.innerHTML = body;
}

function authLdapTestState() {
  try { return JSON.parse(localStorage.getItem('dbaegis_ldap_test_result') || 'null'); }
  catch(e) { return null; }
}

async function authTestLdapSettings(){
  if (!authIsAdmin()) return;
  if (!authLdapLicensed()) { showToast(authLdapEditionNotice(), 'error'); return; }
  var payload = authBuildLdapPayload();
  try {
    payload.test_username = String((document.getElementById('ldap_test_username') || {}).value || '').trim();
    payload.test_password = String((document.getElementById('ldap_test_password') || {}).value || '');
    var res = await apiFetch('/api/auth/settings/test', { method:'POST', body: JSON.stringify(payload) });
    var msg = String((res && res.message) || 'LDAP test succeeded');
    if (res && res.role) msg += ' [' + res.role + ']';
    var detail = res && res.user_dn ? ('DN: ' + res.user_dn) : (res && res.server_uri ? ('Server: ' + res.server_uri) : '');
    authRenderLdapTestResult(true, msg, detail);
    showToast(msg, 'success');
  } catch (e) {
    authRenderLdapTestResult(false, String((e && e.message) || e || 'LDAP test failed'));
    showToast(String((e && e.message) || e || 'LDAP test failed'), 'error');
  }
}

    showToast('Password is required', 'error');

  try {
    var data = await apiFetch('/api/users/' + userId + '/password', {
      method: 'POST',

function authPermissionGroupsHtml(perms) {
  if ((perms || []).indexOf('*') >= 0) return 'All permissions';
  var groups = {};
  (perms || []).forEach(function(p){
    var key = String(p).split(':')[0] || 'other';
    if (!groups[key]) groups[key] = [];
    groups[key].push(AUTH_PERMISSION_LABELS[p] || p);
  });
  return Object.keys(groups).sort().map(function(key){
    return '<div style="margin-bottom:6px"><span class="tag" style="background:#1E2640;color:#94A3B8;font-size:10px">'+authEscape(key)+'</span>'
      + '<div style="margin-top:3px;color:#CBD5E1">'+groups[key].map(authEscape).join('<br>')+'</div></div>';
  }).join('');
}

  var ldapLicensed = authLdapLicensed();
  var ldap = ldapLicensed ? (S.ldapAuth || {}) : {};
  var users = S.users || [];
  var roles = S.roles || [];

function authApplyRoleUiLocks(){
  var userNavBtn = Array.prototype.find.call(document.querySelectorAll('.nav-btn'), function(btn){
    return /Access Control/.test(btn.textContent || '');
  });
  if (userNavBtn) userNavBtn.style.display = authIsAdmin() ? '' : 'none';

  if (authIsAdmin()) return;

  var patterns = authIsReadOnly()
    ? [/\+ Add /i, /\+ New /i, /Backup Now/i, /Add Demo DBs/i, /\bEdit\b/i,
       /\bDelete\b/i, /\bRemove\b/i, /\bSave\b/i, /\bRestore\b/i, /\bTest SMTP\b/i,
       /\bAdd Storage\b/i, /\bNew Webhook\b/i, /Take Snapshot/i, /Run Selected/i]
    : [/\+ Add Connection/i, /\+ New Schedule/i, /Add Demo DBs/i, /\bEdit\b/i,
       /\bDelete\b/i, /\bRemove\b/i, /\bSave\b/i, /\bTest SMTP\b/i,
       /\bAdd Storage\b/i, /\bNew Webhook\b/i, /Take Snapshot/i];
  if (!authIsReadOnly() && !authHasPermission('backups:run')) patterns.push(/Backup Now/i, /Start Backup/i, /Run Selected/i);
  if (!authIsReadOnly() && !authHasPermission('restores:run')) patterns.push(/\bRestore\b/i, /\+ New Restore Job/i);

  Array.prototype.forEach.call(document.querySelectorAll('button'), function(btn){
    var txt = String(btn.textContent || '').trim();
    var shouldLock = patterns.some(function(rx){ return rx.test(txt); });
    if (shouldLock) {
      btn.disabled = true;
      btn.style.opacity = '.55';
      btn.style.cursor = 'not-allowed';
      btn.title = authIsReadOnly() ? 'Read-only user' : 'Admin role required';
      btn.onclick = function(ev){ if (ev) ev.preventDefault(); return false; };
    }
  });
}

(function(){
  var adminGuarded = [
    'addDemoConns','openAddConn','openEditConn','doDelConn','openSchedule',

      var wrapped = function(){
        if (!authIsAdmin()) {
          showToast('Admin role required', 'error');
          return false;
        }
        return orig.apply(this, arguments);
      };
      wrapped.__authWrapped = true;
      window[name] = wrapped;
    }
  });
  [
    ['doBackup', 'backups:run'],
    ['doTest', 'connections:test'],
    ['doPrecheck', 'connections:test']
  ].forEach(function(item){
    var name = item[0], permission = item[1], orig = window[name];
    if (typeof orig === 'function' && !orig.__authWrapped) {
      var wrapped = function(connectionId){
        if (!authHasPermission(permission, connectionId)) {
          showToast('Role does not allow this action for this connection', 'error');
          return false;
        }
        return orig.apply(this, arguments);
      };
      wrapped.__authWrapped = true;
      window[name] = wrapped;
    }
  });
  [
    'openRestoreJob','createRestoreJob','runRestoreJob',

  ].forEach(function(name){

          showToast('Role does not allow restore jobs', 'error');

        }
        return orig.apply(this, arguments);

})();

    return;

};

var _origRefresh = refresh;
refresh = async function(){
  if (!AUTH.user) {
    await refreshPublicSystemStatus();
    render();
    return;
  }
  await _origRefresh();
  if (authIsAdmin()) await authLoadUsers();
  authDecorateTopbar();
  authApplyRoleUiLocks();
};

setTimeout(async function(){
  await licenseCheck(true);
  if (licenseIsBlocking()) {
    render();
    return;
  }
  await refreshPublicSystemStatus();
  await authCheck(true);
  if (AUTH.user) {
    await refresh();
  } else {
    render();
  }
}, 0);

<script>
/* SCHEDULE_FIELDS_HIDE_PATCH_V1 */
(function () {
  const FIELD_RE = /^(logical backup options|physical backup options|backup path)$/i;

  function normalizeText(t) {
    return (t || "").replace(/\s+/g, " ").trim();
  }

  function nearestFieldContainer(el) {
    return el.closest(
      '.form-group, .mb-3, .mb-4, .field, .input-group, .grid > div, .space-y-2, .space-y-3, .space-y-4, [class*="form"], [class*="field"]'
    ) || el.parentElement;
  }

  function hideScheduleFields(root = document) {
    const nodes = root.querySelectorAll('label, span, div, p');
    nodes.forEach((el) => {
      const txt = normalizeText(el.textContent);
      if (!FIELD_RE.test(txt)) return;

      const box = nearestFieldContainer(el);
      if (box) {
        box.style.display = 'none';
        box.setAttribute('data-hidden-by-schedule-patch', '1');
      }
    });

    // Also hide by input names if present
    const nameSelectors = [
      '[name="backup_path"]',
      '[name="logical_backup_options"]',
      '[name="physical_backup_options"]',
      '[name="logical_options"]',
      '[name="physical_options"]'
    ];
    root.querySelectorAll(nameSelectors.join(',')).forEach((inp) => {
      const box = nearestFieldContainer(inp);
      if (box) {
        box.style.display = 'none';
        box.setAttribute('data-hidden-by-schedule-patch', '1');
      }
    });
  }

  function stripScheduleOnlyFields(payload) {
    if (!payload || typeof payload !== 'object') return payload;

    delete payload.backup_path;
    delete payload.logical_backup_options;
    delete payload.physical_backup_options;
    delete payload.logical_options;
    delete payload.physical_options;

    return payload;
  }

  const origFetch = window.fetch;
  window.fetch = async function(resource, init) {
    try {
      const url = typeof resource === 'string' ? resource : (resource && resource.url) || '';
      const method = ((init && init.method) || 'GET').toUpperCase();

      if (url.includes('/api/schedules') && ['POST','PUT','PATCH'].includes(method) && init && init.body && typeof init.body === 'string') {
        try {
          const body = JSON.parse(init.body);
          init.body = JSON.stringify(stripScheduleOnlyFields(body));
        } catch (e) {}
      }
    } catch (e) {}
    return origFetch.apply(this, arguments);
  };

  function boot() {
    hideScheduleFields(document);

    const obs = new MutationObserver(() => hideScheduleFields(document));
    obs.observe(document.documentElement || document.body, {
      childList: true,
      subtree: true
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
