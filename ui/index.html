        + '<button onclick="'+item.log+'" style="background:#1E2640;border:1px solid #2A3350;color:#94A3B8;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit">Log</button>'
        + '<button onclick="'+item.cancel+'" style="background:#FF5A5A18;border:1px solid #FF5A5A44;color:#FF5A5A;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit">Cancel</button>'
        + '</div>';
    }).join('') : '<div style="font-size:12px;color:#00D97E;padding:6px 0">No running jobs.</div>'
  );

  var health = S.systemHealth || {};
  var checks = Array.isArray(health.checks) ? health.checks : [];
  var storageChecks = checks.filter(function(c){
    var label = String(c.label || c.name || '').toLowerCase();
    return /(backup|storage|temp|system backup|log|config|path|directory)/.test(label) || String(c.status || '').toLowerCase() !== 'ok';
  });
  var failingStorageChecks = storageChecks.filter(function(c){ return String(c.status || '').toLowerCase() !== 'ok'; });
  var activeStorage = (S.storage || []).filter(function(d){ return d.active !== false; }).length;
  var inactiveStorage = (S.storage || []).filter(function(d){ return d.active === false; }).length;
  var healthInfo = systemHealthInfo();
  var storageRiskItems = failingStorageChecks.slice(0,5).map(function(c){
    return {color:'#FF5A5A', title:c.label || c.name || 'Health check', detail:c.message || c.status || 'failed', right:String(c.status || '').toUpperCase()};
  });
  if (!(S.storage || []).length) storageRiskItems.push({color:'#FFB900', title:'No storage destinations configured', detail:'Only built-in DBAegis local backup paths are available.', right:'setup'});
  var storagePanel = dashCard(
    'Storage Status',
    'storage',
    'Destination inventory and filesystem health checks.',
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px;margin-bottom:10px">'
      + dashMetric('Health', healthInfo.label, healthInfo.color, '')
      + dashMetric('Active Dest', activeStorage, '#00D97E', '')
      + dashMetric('Inactive', inactiveStorage, inactiveStorage ? '#FFB900' : '#4E5A78', '')
    + '</div>'
    + dashList(storageRiskItems, 'Storage and local path checks are clean.'),
    '<button onclick="setNav(\'storage\')" style="font-size:11px;color:#4E9FFF;background:none;border:none;cursor:pointer;font-family:inherit">Storage</button>'
  );

  var failureRows = periodB.filter(backupJobNeedsReview).map(function(b){
    var conn = C.find(function(c){ return String(c.id) === String(b.connection_id); }) || {};
    var msg = b.error_msg || b.error_message || b.backup_log || b.status || '';
    return {kind:'Backup', category:dashboardFailureCategory(msg), title:backupJobSummaryTitle(b, conn), detail:msg, time:dashboardJobTimestamp(b)};
  }).concat(periodR.filter(restoreJobNeedsReview).map(function(r){
    var conn = restoreJobConnection(r);
    var connName = restoreJobConnectionName(r, conn);
    var msg = r.error_msg || r.message || r.restore_log || r.status || '';
    return {kind:'Restore', category:dashboardFailureCategory(msg), title:(connName ? connName + ' · ' : '') + 'Restore job #'+r.id, detail:msg, time:dashboardJobTimestamp(r)};
  }));
  var failureCategoryMap = {};
  failureRows.forEach(function(row){
    if (!failureCategoryMap[row.category]) failureCategoryMap[row.category] = {category:row.category, count:0, latest:row};
    failureCategoryMap[row.category].count++;
    if ((parseApiDateLocal(row.time)||0) > (parseApiDateLocal(failureCategoryMap[row.category].latest.time)||0)) failureCategoryMap[row.category].latest = row;
  });
  var topFailureReasons = Object.keys(failureCategoryMap).map(function(k){ return failureCategoryMap[k]; }).sort(function(a,b){ return b.count - a.count; });
  var failurePanel = dashCard(
    'Top Failure Reasons',
    'reports',
    'Grouped backup and restore failures for the selected period.',
    dashList(topFailureReasons.slice(0,6).map(function(item){
      return {color:item.category === 'Other' ? '#8896B0' : '#FF5A5A', title:item.category + ' (' + item.count + ')', detail:item.latest.kind + ': ' + (item.latest.title || '') + (item.latest.detail ? ' - ' + String(item.latest.detail).slice(0, 120) : ''), right:dashboardAgeText(item.latest.time)};
    }), 'No backup or restore failures in this period.')
  );

  var attentionItems = [];
  periodB.filter(backupJobNeedsReview).slice(0,4).forEach(function(b){
    var conn = C.find(function(c){ return String(c.id) === String(b.connection_id); }) || {};
    var connName = backupJobConnectionName(b, conn);
    attentionItems.push({color:'#FF5A5A', title:'Backup failed - '+(connName ? connName + ' · Job #' + (b.seq || b.id) : ('Job #'+(b.seq || b.id))), detail:backupJobCode(b) + ' · ' + (b.error_msg || b.error_message || 'Backup failed'), right:dashboardAgeText(b.started_at)});
  });
  periodR.filter(restoreJobNeedsReview).slice(0,3).forEach(function(r){
    var conn = restoreJobConnection(r);
    var connName = restoreJobConnectionName(r, conn);
    attentionItems.push({color:'#FF5A5A', title:'Restore failed - '+(connName ? connName + ' · Job #' + r.id : ('Job #'+r.id)), detail:restoreJobDashboardDetail(r), right:dashboardAgeText(dashboardJobTimestamp(r))});
  });
  C.filter(function(c){ return ['error','disconnected','warning'].indexOf(String(c.status || '').toLowerCase()) >= 0; }).slice(0,4).forEach(function(c){
    attentionItems.push({color:c.status === 'warning' ? '#FFB900' : '#FF5A5A', title:'Connection '+String(c.status || 'needs attention'), detail:(c.name || '')+' · '+String(c.db_type || '').toUpperCase(), right:'connection'});
  });
  overdueSchedules.slice(0,3).forEach(function(s){
    var conn = C.find(function(c){ return String(c.id) === String(s.connection_id); }) || {};
    attentionItems.push({color:'#FFB900', title:'Schedule overdue - '+(conn.name || ('#'+s.id)), detail:'Next run was '+fmtDT(s.next_run || ''), right:'schedule'});
  });
  var attentionPanel = dashCard(
    'Needs Attention',
    'notifications',
    'Failures, connection issues, and overdue schedules.',
    dashList(attentionItems.slice(0,10), 'No attention items in this scope.'),
    '<button onclick="refresh()" style="font-size:11px;color:#4E9FFF;background:none;border:none;cursor:pointer;font-family:inherit">Refresh</button>'
  );

  var dashTags = allConnectionTags();
  if (dashTag && dashTags.map(function(t){ return t.toLowerCase(); }).indexOf(dashTag.toLowerCase()) < 0) {
    dashTag = '';
    S._dashTag = '';
  }
  var filterBar = '<div class="form-panel" style="margin-bottom:18px">'
    + '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between">'
    + '<div><div style="font-size:13px;color:#E2E8F0;margin-bottom:3px">Dashboard Scope</div><div style="font-size:11px;color:#4E5A78">'+C.length+' of '+allC.length+' connections shown</div></div>'
    + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8;margin:0">Tag'
    + '<select onchange="dashboardSetTag(this.value)" style="width:150px;padding:8px 10px;background:#0B0E17;border:1px solid #2A3350;border-radius:7px;color:#E2E8F0;font-family:inherit;font-size:13px">'
    + '<option value="">All Tags</option>'
    + dashTags.map(function(tag){ return '<option value="'+escHtml(tag)+'" '+(dashTag.toLowerCase()===tag.toLowerCase()?'selected':'')+'>#'+escHtml(tag)+'</option>'; }).join('')
    + '</select></label>'
    + periodSel
    + '<button onclick="refresh()" class="btn" style="background:#1E2640;color:#8896B0">Refresh</button>'
    + '</div></div></div>';

  // ── Assemble ──────────────────────────────────────────────────────────────
  return filterBar
    + '<div class="dashboard-stats">'
    + statCard('Connections', C.length, C.filter(function(c){return c.status==='connected';}).length+' active', '#4E9FFF', 'connections')
    + statCard({day:'Backups (24h)',week:'Backups (7d)',month:'Backups (30d)',quarter:'Backups (90d)',half:'Backups (180d)',year:'Backups (1yr)'}[period]||'Backups', periodB.length, failed+' failed · '+running+' running' + (failed ? ' · ' + (failedReview ? failedReview + ' needs review' : (failedDismissed ? failedDismissed + ' dismissed' : 'reviewed')) : ''), '#00D97E', 'backups')
    + statCard('Success Rate', rate+'%', 'This period', rate>=90?'#00D97E':'#FF5A5A', 'check')
    + statCard('Restore Jobs', periodR.length, restoreFail+' failed', restoreFail?'#FF5A5A':'#14B8A6', 'restore')
    + statCard('Total Size', szFmt, 'This period', '#A78BFA', 'storage')
    + '</div>'

    + '<div class="dashboard-main">'

    // ── Left column
    + '<div style="display:flex;flex-direction:column;gap:16px;min-width:0">'

    // Chart
    + '<div class="card" style="overflow:hidden">'+chart+'</div>'

    + runningJobsPanel
    + attentionPanel

    // Recent backups
    + '<div class="card" style="overflow:hidden">'
    + '<div style="padding:14px 20px;border-bottom:1px solid #1E2640;display:flex;justify-content:space-between;align-items:center">'
    + '<span style="font-weight:400;font-size:13px">Recent Backups</span>'
    + '<button onclick="setNav(\'backups\')" style="font-size:12px;color:#4E9FFF;background:none;border:none;cursor:pointer;font-family:inherit">View all →</button></div>'
    + (periodB.length===0
        ? '<div class="empty">No backups in this period.</div>'
        : '<table><thead><tr><th>Connection</th><th>Size</th><th>Date</th><th>Status</th></tr></thead><tbody>'+recentRows+'</tbody></table>')
    + '</div>'

    // Recent failures
    + '<div class="card" style="padding:16px 20px">'
    + '<div style="display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px;margin-bottom:10px">'+uiIcon('close',16)+'<span>Recent Failures</span></div>'
    + failsHtml
    + '</div>'

    + failurePanel

    + '</div>'

    // ── Right column
    + '<div class="dashboard-side">'

    // Quick backup
    + '<div class="card" style="padding:16px 16px"><div style="display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px;margin-bottom:10px">'+uiIcon('test',16)+'<span>Quick Backup</span></div>'
    + (C.length===0 ? '<div style="font-size:12px;color:#4E5A78">No connections yet.</div>' : quickBtns)
    + '</div>'

    + schedulePanel
    + restorePanel
    + storagePanel

    // DB Coverage
    + '<div class="card" style="padding:16px 16px"><div style="display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px;margin-bottom:12px">'+uiIcon('database',16)+'<span>Configured DB Coverage</span></div>'+coverage+'</div>'

    + '</div></div>';
}

function statCard(label, value, sub, color, icon) {
  return '<div class="stat-card">'
    + '<div style="position:absolute;top:16px;right:18px;opacity:.18;color:' + color + '">' + uiIcon(icon || 'database', 28) + '</div>'
    + '<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.15em;margin-bottom:10px">' + label + '</div>'
    + '<div style="font-size:32px;font-weight:400;color:' + color + '">' + value + '</div>'
    + '<div style="font-size:12px;color:#4E5A78;margin-top:6px">' + sub + '</div></div>';
}

// ─── Connections ────────────────────────────────────────────────────────────
function vConnections() {
  var C = S.connections;
  var Q = (S.connSearch||'').toLowerCase().trim();
  var fil = Q ? C.filter(function(c) {
    return c.name.toLowerCase().indexOf(Q)>=0
      || (c.db_type||'').toLowerCase().indexOf(Q)>=0
      || (c.host||'').toLowerCase().indexOf(Q)>=0
      || (c.database||'').toLowerCase().indexOf(Q)>=0;
  }) : C;

  if (!C.length) return emptyState('connections', 'No connections yet', 'Click + Add Connection to get started');

  var clearBtn = '<button id="conn-search-clear" onclick="S.connSearch=\'\';renderConnResults()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4E5A78;cursor:pointer;line-height:1;font-family:inherit;display:'+(Q?'flex':'none')+';align-items:center;justify-content:center">'+uiIcon('close',14)+'</button>';
  var searchBox = '<div style="position:relative;width:280px">'
    + '<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#4E5A78;pointer-events:none">'+uiIcon('search',14)+'</span>'
    + '<input id="conn-search" type="text" placeholder="Search by name, host, type…" oninput="setConnSearch(this.value)" style="width:100%;box-sizing:border-box;padding:7px 12px 7px 32px;background:#131929;border:1px solid #2A3350;border-radius:8px;color:#E2E8F0;font-family:inherit;font-size:13px;outline:none"/>'
    + clearBtn
    + '</div>';

  var connectedN = C.filter(function(c){return c.status==='connected';}).length;
  var errorN = C.filter(function(c){return c.status==='error';}).length;
  var warningN = C.filter(function(c){return String(c.status || '').toLowerCase()==='warning';}).length;
  var typeCount = {};
  C.forEach(function(c){ var key = normalizeDbType(c.db_type) || 'unknown'; typeCount[key] = true; });
  var withRecentSuccess = C.filter(function(c){
    var b = latestConnectionBackup(c.id, true);
    var d = b ? parseApiDateLocal(dashboardJobTimestamp(b)) : null;
    return d && (Date.now() - d.getTime()) <= 86400000;
  }).length;

  var metrics = '<div class="metric-grid" style="margin-bottom:16px">'
    + uiMetricCard('Connections', C.length, Object.keys(typeCount).length + ' engine types', '#4E9FFF')
    + uiMetricCard('Connected', connectedN, 'ready for backup', '#00D97E')
    + uiMetricCard('Needs Attention', errorN + warningN, errorN + ' error · ' + warningN + ' warning', (errorN || warningN) ? '#FFB900' : '#4E5A78')
    + uiMetricCard('Recent Success', withRecentSuccess, 'successful backup in 24h', withRecentSuccess ? '#14B8A6' : '#4E5A78')
    + '</div>';

  var summaryBar = '<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">'
    + searchBox
    + '<div style="display:flex;gap:12px;margin-left:auto;flex-wrap:wrap">'
    + '<span style="font-size:12px;color:#4E5A78"><span id="conn-count">'+(Q?fil.length+' of '+C.length:C.length)+' connection'+(C.length!==1?'s':'')+'</span></span>'
    + '<span style="font-size:12px;color:#00D97E">● '+connectedN+' connected</span>'
    + (errorN ? '<span style="font-size:12px;color:#FF5A5A">● '+errorN+' error</span>' : '')
    + '</div>'
    + '</div>';

  return '<div id="conn-results">'
    + metrics
    + summaryBar
    + '<div id="conn-list">' + buildConnGroups(fil) + '</div>'
    + '</div>';
}

// ─── Backup History ─────────────────────────────────────────────────────────
function buildStatsBar(total, successN, failN, sizeFmt) {
  return '<div class="card" style="padding:14px 20px;flex:1;min-width:120px;display:flex;flex-direction:column;gap:4px">'
    + '<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.1em">Total Runs</div>'
    + '<div style="font-size:22px;font-weight:400;color:#E2E8F0">' + total + '</div></div>'
    + '<div class="card" style="padding:14px 20px;flex:1;min-width:120px;display:flex;flex-direction:column;gap:4px">'
    + '<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.1em">Successful</div>'
    + '<div style="font-size:22px;font-weight:400;color:#00D97E">' + successN + '</div></div>'
    + '<div class="card" style="padding:14px 20px;flex:1;min-width:120px;display:flex;flex-direction:column;gap:4px">'
    + '<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.1em">Failed</div>'
    + '<div style="font-size:22px;font-weight:400;color:' + (failN ? '#FF5A5A' : '#4E5A78') + '">' + failN + '</div></div>'
    + '<div class="card" style="padding:14px 20px;flex:1;min-width:120px;display:flex;flex-direction:column;gap:4px">'
    + '<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.1em">Total Size</div>'
    + '<div style="font-size:22px;font-weight:400;color:#4E9FFF">' + sizeFmt + '</div></div>';
}

function buildBackupFailureSummary(fil) {
  var failedRows = (fil || []).filter(backupJobNeedsReview);
  if (!failedRows.length) return '';
  var failureMap = {};
  failedRows.forEach(function(b){
    var cat = dashboardFailureCategory(b.error_msg || b.error_message || b.backup_log || b.status || '');
    if (!failureMap[cat]) failureMap[cat] = 0;
    failureMap[cat]++;
  });
  var failureItems = Object.keys(failureMap).sort(function(a,b){ return failureMap[b] - failureMap[a]; }).slice(0,4).map(function(cat){
    return '<span class="pill" style="background:#FF5A5A14;color:#FF9999;border:1px solid #FF5A5A33;font-size:11px;padding:4px 8px;border-radius:7px">'+escHtml(cat)+' · '+failureMap[cat]+'</span>';
  }).join('');
  var latestFailures = failedRows.slice(0, 3).map(function(b){
    var conn = (S.connections || []).find(function(c){ return String(c.id) === String(b.connection_id); }) || {};
    var insight = operationFailureInsight('backup', b);
    var dbType = String(conn.db_type || b.conn_db_type || '').toUpperCase();
    var title = backupJobSummaryTitle(b, conn);
    return '<div style="display:grid;grid-template-columns:minmax(120px,1fr) minmax(220px,2fr) auto;gap:10px;align-items:center;padding-top:9px;margin-top:9px;border-top:1px solid #FF5A5A1F">'
      + '<div style="min-width:0"><div title="'+escHtml(title)+'" style="font-size:11px;color:#E2E8F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(title)+'</div><div style="font-size:10px;color:#64748B">'+escHtml(dbType)+'</div></div>'
      + '<div style="min-width:0"><div style="font-size:11px;color:#FF9999">'+escHtml(insight.cause)+'</div><div style="font-size:10px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+escHtml(insight.action)+'</div></div>'
      + '<div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap"><button class="btn-sm" onclick="viewBackupLog('+b.id+')">Logs</button>'+(b.connection_id ? '<button class="btn-sm" onclick="doBackup('+b.connection_id+')" style="background:#4E9FFF18;color:#4E9FFF;border-color:#4E9FFF44">Retry</button>' : '')+(authHasPermission('backups:run', b.connection_id) ? '<button class="btn-sm" onclick="dismissBackupJob('+b.id+')" style="background:#FF5A5A14;color:#FF9999;border-color:#FF5A5A33">Dismiss</button>' : '')+'</div>'
      + '</div>';
  }).join('');
  return '<div class="form-panel" style="margin-bottom:16px;border-color:#FF5A5A33;background:#FF5A5A08">'
    + '<div style="font-size:12px;color:#FF9999;margin-bottom:8px">Backup Failure Guidance</div>'
    + '<div style="display:flex;gap:7px;flex-wrap:wrap">'+failureItems+'</div>'
    + latestFailures
    + '</div>';
}

function buildBackupGroups(fil, B, C) {
  if (!fil.length) return '<div class="card"><div class="empty">No backups match your search.</div></div>';

  var groups = [];
  var groupMap = {};
  fil.forEach(function(b) {
    var cid = b.connection_id;
    if (!groupMap[cid]) {
      var conn = C.find(function(x){return x.id===cid;});
      groupMap[cid] = {conn:conn, cid:cid, backups:[], fallbackName: b.conn_name, fallbackType: b.conn_db_type};
      groups.push(groupMap[cid]);
    }
    groupMap[cid].backups.push(b);
  });
  groups.sort(function(a,b){ return (b.backups[0].id||0)-(a.backups[0].id||0); });

  function renderConnectionBackupGroup(g) {
    var conn=g.conn;
    var clr=dc(conn ? conn.db_type : g.fallbackType);
    var icon=dicon(conn ? conn.db_type : g.fallbackType, 18);
    var label=conn ? conn.name : (g.fallbackName || ('Connection #'+g.cid));
    var dbType=((conn ? conn.db_type : g.fallbackType)||'unknown').toUpperCase();
    var bks=g.backups, lastBk=bks[0], lastStatus=lastBk.status;
    var lastStatusKey=String(lastStatus||'').toLowerCase();
    var lastSC=SC[lastStatus]||'#8896B0', lastSB=SB[lastStatus]||'#1E2640';
    var lastStatusHtml=
      dashboardIsSuccessStatus(lastStatusKey) ? '<span style="color:#00D97E;font-size:12px;font-weight:700">SUCCESS</span>' :
      dashboardIsFailureStatus(lastStatusKey) ? '<span style="color:#FF5A5A;font-size:12px;font-weight:700">'+escHtml(String(lastStatus||'').toUpperCase())+'</span>' :
      '<span class="tag" style="background:'+lastSB+';color:'+lastSC+'">'+escHtml(String(lastStatus||'').toUpperCase())+'</span>';
    var successN=bks.filter(function(b){ return dashboardIsSuccessStatus(b.status); }).length;
    var failN=bks.filter(function(b){ return dashboardIsFailureStatus(b.status); }).length;
    var totalSz=bks.reduce(function(s,b){return s+(b.size_bytes||0);},0);
    var szFmt=totalSz>1024*1024?(totalSz/1024/1024).toFixed(1)+' MB':(totalSz/1024).toFixed(0)+' KB';
    var expanded=(S.expandedGroups||{})[g.cid];

    var header='<div onclick="toggleGroup('+g.cid+')" style="padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;user-select:none">'
      +'<div style="width:40px;height:40px;border-radius:9px;background:'+clr+'22;border:1px solid '+clr+'44;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+icon+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-weight:400;font-size:14px;display:flex;align-items:center;gap:8px">'+escHtml(label)
      +'<span style="font-size:10px;color:'+clr+';background:'+clr+'18;border:1px solid '+clr+'33;border-radius:4px;padding:1px 6px;font-weight:400">'+escHtml(dbType)+'</span></div>'
      +'<div style="font-size:12px;color:#4E5A78;margin-top:3px;display:flex;gap:14px">'
      +'<span>'+bks.length+' run'+(bks.length!==1?'s':'')+'</span>'
      +'<span style="color:#00D97E">✓ '+successN+'</span>'
      +(failN?'<span style="color:#FF5A5A">✗ '+failN+'</span>':'')
      +'<span style="color:#4E9FFF">⬡ '+szFmt+'</span>'
      +'</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-right:8px">'
      +lastStatusHtml
      +'<span style="font-size:11px;color:#4E5A78">'+fmtDT(lastBk.started_at||'')+'</span>'
      +'</div>'
      +'<span style="color:#4E5A78;font-size:13px;flex-shrink:0">'+(expanded?'▲':'▼')+'</span>'
      +'</div>';

    var tableRows=bks.map(function(b, idx){
      var sz2=b.size_bytes?(b.size_bytes>1024*1024?(b.size_bytes/1024/1024).toFixed(2)+' MB':(b.size_bytes/1024).toFixed(0)+' KB'):'—';
      var dur=b.duration_sec?b.duration_sec.toFixed(1)+'s':'—';
      var mode=normalizeBackupType(b.backup_type || ((conn||{}).backup_type) || 'logical');
      var modeColor=mode==='physical'?'#A78BFA':'#4E9FFF';
      var bsc=SC[String(b.status||'').toLowerCase()]||'#8896B0', bsb=SB[String(b.status||'').toLowerCase()]||'#1E2640';
      var isRunning = dashboardIsRunningStatus(b.status);
      var cancelBtn = isRunning ? '<button class="btn-sm" style="background:#FF5A5A22;color:#FF5A5A;border-color:#FF5A5A44;margin-right:6px" onclick="event.stopPropagation();cancelBackup('+b.id+')">Cancel</button>' : '';
      var act='<button class="btn-sm" style="background:#334155;color:#fff;border-color:#475569;margin-right:6px" onclick="event.stopPropagation();viewBackupLog('+b.id+')">Logs</button>'+cancelBtn;
      if (dashboardIsFailureStatus(b.status) && b.connection_id) act += '<button class="btn-sm" style="background:#4E9FFF18;color:#4E9FFF;border-color:#4E9FFF44" onclick="event.stopPropagation();doBackup('+b.connection_id+')">Retry</button>';
      if (backupJobNeedsReview(b) && authHasPermission('backups:run', b.connection_id)) act += '<button class="btn-sm" style="background:#FF5A5A14;color:#FF9999;border-color:#FF5A5A33;margin-left:6px" onclick="event.stopPropagation();dismissBackupJob('+b.id+')">Dismiss</button>';
      var rbConn = C.find(function(x){return x.id===b.connection_id;}); if(dashboardIsSuccessStatus(b.status) && supportsRestoreDb((rbConn||{}).db_type)) act += '<button class="btn-sm" style="background:#00D97E18;color:#00D97E;border-color:#00D97E44" onclick="event.stopPropagation();openRestoreModal('+b.id+')">↩ Restore</button>'; if (dashboardIsSuccessStatus(b.status) && rbConn && !supportsRestoreDb(rbConn.db_type)) act += '<span class="btn-sm" style="opacity:.55;cursor:not-allowed">Restore n/a</span>';
      var fp=b.file_path?'<span title="'+escHtml(b.file_path)+'" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle;color:#4E9FFF;font-size:11px">'+escHtml(String(b.file_path).split('/').pop())+'</span>':'<span style="color:#3A4460">—</span>';
      var dismissedBadge = backupJobIsDismissed(b) ? ' <span class="tag" style="background:#64748B18;color:#94A3B8;border-color:#64748B44">DISMISSED</span>' : '';
      var isSel=S.selectedBackup===b.id;
      return '<tr class="clickable'+(isSel?' selected':'')+'" onclick="openLog('+b.id+')">'
        +'<td style="color:#4E5A78;font-family:monospace;font-size:12px">#'+b.id+'</td>'
        +'<td style="color:#8896B0;font-size:12px">'+fmtDT(b.started_at)+'</td>'
        +'<td><span class="tag" style="background:'+modeColor+'18;color:'+modeColor+';border-color:'+modeColor+'44">'+mode.toUpperCase()+'</span></td>'
        +'<td style="color:#8896B0">'+sz2+'</td>'
        +'<td style="color:#4E5A78">'+dur+'</td>'
        +'<td>'+fp+'</td>'
        +'<td><span class="tag" style="background:'+bsb+';color:'+bsc+'">'+escHtml(String(b.status||'').toUpperCase())+'</span>'+dismissedBadge+'</td>'
        +'<td>'+act+'</td>'
        +'</tr>';
    }).join('');

    var detailPanel=(function(){
      if(!S.selectedBackup) return '';
      var b=B.find(function(x){return x.id===S.selectedBackup&&x.connection_id===g.cid;});
      if(!b) return '';
      var sz2=b.size_bytes?(b.size_bytes/1024/1024).toFixed(3)+' MB':'0 bytes';
      var metaMode=normalizeBackupType(b.backup_type || ((conn||{}).backup_type) || 'logical').toUpperCase();
      var meta=[['Backup ID','#'+(b.seq || b.id || '—')],['Mode',metaMode],['Started',fmtDT(b.started_at||'—')],['Duration',b.duration_sec?b.duration_sec.toFixed(2)+'s':'—'],['Size',sz2],['Node',b.node_host||'vault-server (local)'],['File Path',b.file_path||'—'],['Connection',conn?conn.name:'—'],['DB Type',((conn&&conn.db_type)||'—').toUpperCase()]];
      var metaCells=meta.map(function(m){return '<div style="padding:12px 16px;border-right:1px solid #1E2640"><div style="font-size:10px;color:#4E5A78;text-transform:none;letter-spacing:.12em;margin-bottom:4px">'+escHtml(m[0])+'</div><div style="font-size:12px;color:#E2E8F0;word-break:break-all">'+escHtml(m[1])+'</div></div>';}).join('');
      var bsc2=SC[String(b.status||'').toLowerCase()]||'#8896B0', bsb2=SB[String(b.status||'').toLowerCase()]||'#1E2640';
      var dismissedDetail = backupJobIsDismissed(b) ? '<div style="padding:0 18px 12px;font-size:11px;color:#94A3B8">Dismissed '+escHtml(fmtDT(b.dismissed_at || ''))+(b.dismissed_by_username ? ' by '+escHtml(b.dismissed_by_username) : '')+'</div>' : '';
      var errText=b.error_msg||b.error_message||'';
      var rawLog=(b.backup_log||'').trim();
      // Build log lines array — parse timestamps and classify each line
      var logLines=rawLog?rawLog.split('\n'):[];
      var logRows=logLines.map(function(line){
        var isErr=line.indexOf('FAILED')>=0||line.indexOf('ERROR')>=0||line.indexOf('failed')>=0;
        var isOk=line.indexOf('✓')>=0||line.indexOf('Completed')>=0||line.indexOf('Exported')>=0||line.indexOf('Uploaded')>=0||line.indexOf('Restored')>=0;
        var ts='', msg=line;
        var tsm=line.match(/^(\[\d{4}-\d{2}-\d{2}\s[\d:]+\s\w+\])/);
        if(tsm){ts=tsm[1];msg=line.slice(tsm[1].length).trim();}
        var col=isErr?'#FF9999':isOk?'#00D97E':'#8896B0';
        var icon=isErr?'✕':isOk?'✓':'·';
        var icol=isErr?'#FF5A5A':isOk?'#00D97E':'#2A3350';
        return '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #0D1020;align-items:flex-start">'
          +'<span style="font-size:10px;color:'+icol+';flex-shrink:0;margin-top:1px;font-family:monospace">'+icon+'</span>'
          +(ts?'<span style="font-size:10px;color:#3A4460;flex-shrink:0;font-family:monospace;white-space:nowrap">'+escHtml(ts)+'</span>':'')
          +'<span style="font-size:11px;color:'+col+';font-family:monospace;word-break:break-all">'+escHtml(msg)+'</span>'
          +'</div>';
      }).join('');

      var logHeader, logBody;
      if(rawLog){
        var lineCount=logLines.length;
        var hasErr=errText.length>0;
        var headerColor=hasErr?'#FF5A5A':'#00D97E';
        var headerLabel=hasErr?'Backup Log — Failed':'Backup Log — Success';
        logHeader='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
          +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="font-size:11px;color:'+headerColor+';text-transform:none;letter-spacing:.12em;font-weight:400">'+headerLabel+'</span>'
          +'<span style="font-size:10px;color:#3A4460;background:#131929;padding:2px 8px;border-radius:10px;border:1px solid #1E2640">'+lineCount+' lines</span>'
          +'</div>'
          +'<button onclick="copyBackupLog('+b.id+')" style="background:#131929;border:1px solid #1E2640;color:#8896B0;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">⧉ Copy</button>'
          +'</div>';
        logBody='<div style="background:#070A12;border:1px solid '+(hasErr?'#FF5A5A33':'#1E2640')+';border-radius:8px;padding:10px 12px;max-height:240px;overflow-y:auto">'+logRows+'</div>';
        if(hasErr){
          logBody+='<div style="margin-top:10px;background:#FF5A5A0F;border:1px solid #FF5A5A33;border-radius:8px;padding:10px 12px">'
            +'<div style="font-size:10px;color:#FF5A5A;text-transform:none;letter-spacing:.12em;margin-bottom:6px">Error Detail</div>'
            +'<pre style="margin:0;font-size:11px;color:#FF9999;white-space:pre-wrap;font-family:monospace;word-break:break-all">'+escHtml(errText)+'</pre>'
            +'</div>';
        }
      } else if(errText){
        logHeader='<div style="font-size:11px;color:#FF5A5A;text-transform:none;letter-spacing:.12em;margin-bottom:8px">Error Output</div>';
        logBody='<pre style="background:#0B0E17;border:1px solid #FF5A5A33;border-radius:8px;padding:12px;font-size:11px;color:#FF9999;overflow:auto;max-height:200px;white-space:pre-wrap;font-family:monospace;margin:0">'+escHtml(errText)+'</pre>';
      } else {
        logHeader='<div style="font-size:11px;color:#3A4460;text-transform:none;letter-spacing:.12em;margin-bottom:8px">Log Output</div>';
        logBody='<div style="background:#070A12;border:1px solid #1E2640;border-radius:8px;padding:12px;font-size:11px;color:#3A4460;font-family:monospace;text-align:center">No log recorded — run a new backup to capture output.</div>';
      }
      var logContent='<div style="padding:14px 18px">'+logHeader+logBody+'</div>';
      if (dashboardIsFailureStatus(b.status)) {
        logContent='<div style="padding:14px 18px">'+failureInsightHtml('backup', b, false)+'</div>'+logContent;
      }
      return '<div id="detail-panel" style="margin:0;border-top:1px solid #1A1D28;background:#0D1020">'
        +'<div style="padding:14px 18px;border-bottom:1px solid #1E2640;display:flex;justify-content:space-between;align-items:center">'
        +'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">'+icon+'</span>'
        +'<span style="font-weight:400;font-size:13px">'+escHtml(label)+'</span>'
        +'<span class="tag" style="background:'+bsb2+';color:'+bsc2+'">'+escHtml(String(b.status||'').toUpperCase())+'</span>'
        +(backupJobIsDismissed(b) ? '<span class="tag" style="background:#64748B18;color:#94A3B8;border-color:#64748B44">DISMISSED</span>' : '')+'</div>'
        +'<button onclick="S.selectedBackup=null;render()" style="background:none;border:none;color:#4E5A78;cursor:pointer;font-size:18px;font-family:inherit">×</button></div>'
        +'<div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #1E2640">'+metaCells+'</div>'
        +dismissedDetail
        +logContent+'</div>';
    })();

    var expandedPanel=expanded
      ?'<div style="border-top:1px solid #1A1D28;overflow:auto">'
        +'<table style="width:100%"><thead><tr>'
        +'<th style="font-size:11px">ID</th><th style="font-size:11px">Started</th><th style="font-size:11px">Mode</th>'
        +'<th style="font-size:11px">Size</th><th style="font-size:11px">Duration</th><th style="font-size:11px">File</th>'
        +'<th style="font-size:11px">Status</th><th style="font-size:11px">Action</th>'
        +'</tr></thead><tbody>'+tableRows+'</tbody></table>'
        +detailPanel+'</div>'
      :'';

    return '<div class="card" style="margin-bottom:12px;overflow:hidden">'+header+expandedPanel+'</div>';
  }

  var dbBuckets = [];
  var dbMap = {};
  groups.forEach(function(g) {
    var dbKey = String((g.conn ? g.conn.db_type : g.fallbackType) || 'unknown').toLowerCase();
    if (!dbMap[dbKey]) {
      dbMap[dbKey] = {
        key: dbKey,
        label: dbKey.toUpperCase(),
        color: dc(dbKey),
        icon: dicon(dbKey, 16),
        groups: [],
        latestId: 0
      };
      dbBuckets.push(dbMap[dbKey]);
    }
    dbMap[dbKey].groups.push(g);
    dbMap[dbKey].latestId = Math.max(dbMap[dbKey].latestId, g.backups[0].id || 0);
  });
  dbBuckets.sort(function(a,b){ return b.latestId - a.latestId; });

  return dbBuckets.map(function(bucket) {
    var expanded = !!((S.expandedBackupDbGroups||{})[bucket.key]);
    return '<div style="margin-bottom:20px">'
      + '<div onclick="toggleBackupDbGroup('+jsArg(bucket.key)+')" style="display:flex;align-items:center;gap:10px;margin-bottom:'+(expanded?10:0)+'px;padding:0 2px;cursor:pointer;user-select:none">'
      + '<div style="width:34px;height:34px;border-radius:9px;background:'+bucket.color+'22;border:1px solid '+bucket.color+'44;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+bucket.icon+'</div>'
      + '<div style="font-size:13px;font-weight:400;color:#E2E8F0">'+escHtml(bucket.label)+'</div>'
      + '<div style="font-size:11px;color:#4E5A78">'+bucket.groups.length+' connection'+(bucket.groups.length!==1?'s':'')+'</div>'
      + '<div style="margin-left:auto;color:#4E5A78;font-size:13px">'+(expanded?'▲':'▼')+'</div>'
      + '</div>'
      + (expanded ? bucket.groups.map(renderConnectionBackupGroup).join('') : '')
      + '</div>';
  }).join('');
}

function syncBackupDateRangeControls() {
  var active = !!(S._bkDateFrom || S._bkDateTo);
  var from = document.getElementById('bk-date-from');
  var to = document.getElementById('bk-date-to');
  if (from) from.value = S._bkDateFrom || '';
  if (to) to.value = S._bkDateTo || '';
  updateDateRangeClearButton('bk-date-clear', active);
}
function setBackupDateFrom(v){ S._bkPeriod = 'custom'; S._bkDateFrom = v || ''; syncBackupDateRangeControls(); queueBackupResultsRender(25); }
function setBackupDateTo(v){ S._bkPeriod = 'custom'; S._bkDateTo = v || ''; syncBackupDateRangeControls(); queueBackupResultsRender(25); }
function clearBackupDateRange(){ S._bkDateFrom=''; S._bkDateTo=''; S._bkPeriod='all'; syncBackupDateRangeControls(); render(); }

function vBackups() {
  var B = S.backups, C = S.connections, F = S.filter;
  var Q = (S.backupSearch||'').toLowerCase().trim();

  // ── Period filter ──────────────────────────────────────────────────────────
  var BP = (S._bkDateFrom || S._bkDateTo) ? 'custom' : (S._bkPeriod || 'all');
  var _bkPeriodLabels = {all:'All Time',day:'1 Day',week:'1 Week',month:'1 Month',quarter:'3 Months',half:'6 Months',year:'1 Year',custom:'Custom Range'};
  var periodSelect = '<label style="display:flex;align-items:center;gap:7px;font-size:12px;color:#94A3B8;margin:0">Activity Period'
    + '<select onchange="setBackupPeriod(this.value)" style="width:150px;padding:8px 10px;background:#131929;border:1px solid #2A3350;border-radius:8px;color:#E2E8F0;font-family:inherit;font-size:13px">'
    + ['all','day','week','month','quarter','half','year','custom'].map(function(p){ return '<option value="'+p+'" '+(BP===p?'selected':'')+'>'+_bkPeriodLabels[p]+'</option>'; }).join('')
    + '</select></label>';

  var rangeActive = !!(S._bkDateFrom || S._bkDateTo);

  var fbg, fbc, ftc;
  var fbtns = ['all','success','failed','running'].map(function(f) {
    fbg = F===f ? '#4E9FFF' : 'transparent';
    fbc = F===f ? '#4E9FFF' : '#2A3350';
    ftc = F===f ? '#fff' : '#8896B0';
    return '<button class="filter-btn" style="background:'+fbg+';border-color:'+fbc+';color:'+ftc+'" onclick="setFilter(\''+f+'\')">' + f.toUpperCase() + '</button>';
  }).join('');

  var clearBtn = '<button id="bk-search-clear" onclick="S.backupSearch=\'\';renderBackupResults()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#4E5A78;cursor:pointer;line-height:1;font-family:inherit;display:'+(Q?'flex':'none')+';align-items:center;justify-content:center">'+uiIcon('close',14)+'</button>';
  var searchBox = '<div style="position:relative;flex:1;max-width:340px">'
    + '<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#4E5A78;pointer-events:none">'+uiIcon('search',14)+'</span>'
    + '<input id="bk-search" type="text" placeholder="Search by name, host, DB type…" oninput="setBackupSearch(this.value)" style="width:100%;box-sizing:border-box;padding:7px 12px 7px 32px;background:#131929;border:1px solid #2A3350;border-radius:8px;color:#E2E8F0;font-family:inherit;font-size:13px;outline:none"/>'
    + clearBtn
    + '</div>';

  var customRangeControls = BP === 'custom'
    ? '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      + '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8;margin:0">From'
      + '<input id="bk-date-from" type="date" value="'+escHtml(S._bkDateFrom||'')+'" onchange="setBackupDateFrom(this.value)" style="padding:8px 10px;border-radius:8px;border:1px solid #2A3350;background:#131929;color:#E2E8F0;font-size:12px;font-family:inherit;min-width:150px;max-width:170px" /></label>'
      + '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8;margin:0">To'
      + '<input id="bk-date-to" type="date" value="'+escHtml(S._bkDateTo||'')+'" onchange="setBackupDateTo(this.value)" style="padding:8px 10px;border-radius:8px;border:1px solid #2A3350;background:#131929;color:#E2E8F0;font-size:12px;font-family:inherit;min-width:150px;max-width:170px" /></label>'
      + dateRangeClearButtonHtml('clearBackupDateRange()', rangeActive, 'bk-date-clear')
      + '</div>'
    : '';

  var controlBar = '<div class="form-panel" style="margin-bottom:20px">'
    + '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between">'
    + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    + periodSelect
    + customRangeControls
    + '</div>'
    + searchBox
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid #1A1D28">'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">' + fbtns + '</div>'
    + '</div></div>';

  // Apply period filter to backup history
  var _bkPdays = activityPeriodDays(BP);
  var _bkFil = B;
  if (_bkPdays > 0) {
    var _bkCutoffMs = Date.now() - _bkPdays * 86400000;
    _bkFil = B.filter(function(b){
      var d = parseApiDateLocal(b.started_at||'');
      return d ? d.getTime() >= _bkCutoffMs : false;
    });
  }

  if (S._bkDateFrom || S._bkDateTo) {
    _bkFil = _bkFil.filter(function(b){
      var d = parseApiDateLocal(b.started_at||'');
      if (!d) return false;
      var ds = _localDateStr(d);
      if (S._bkDateFrom && ds < S._bkDateFrom) return false;
      if (S._bkDateTo && ds > S._bkDateTo) return false;
      return true;
    });
  }

  var fil = _bkFil.filter(function(b){ return dashboardStatusMatchesFilter(b.status, F); });
  if (Q) {
    fil = fil.filter(function(b) {
      var conn = C.find(function(x){return x.id===b.connection_id;});
      var name = conn ? conn.name.toLowerCase() : '';
      var host = conn ? (conn.host||'').toLowerCase() : '';
      var dbtype = conn ? (conn.db_type||'').toLowerCase() : '';
      var fp = (b.file_path||'').toLowerCase();
      return name.indexOf(Q)>=0 || host.indexOf(Q)>=0 || dbtype.indexOf(Q)>=0 || fp.indexOf(Q)>=0;
    });
  }

  var totalSize = fil.reduce(function(s,b){ return s+(b.size_bytes||0); },0);
  var successCount = fil.filter(function(b){ return dashboardIsSuccessStatus(b.status); }).length;
  var failCount = fil.filter(function(b){ return dashboardIsFailureStatus(b.status); }).length;
  var sizeFmt = totalSize>1024*1024*1024?(totalSize/1024/1024/1024).toFixed(2)+' GB':totalSize>1024*1024?(totalSize/1024/1024).toFixed(1)+' MB':(totalSize/1024).toFixed(0)+' KB';

  var statsBar = '<div id="backup-stats" style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">'
    + buildStatsBar(fil.length, successCount, failCount, sizeFmt)
    + '</div>';

  var failureSummary = '<div id="backup-failure-summary">' + buildBackupFailureSummary(fil) + '</div>';

  var groups = '<div id="backup-groups">' + buildBackupGroups(fil, B, C) + '</div>';

  return '<div id="backup-results">'
    + controlBar + statsBar + failureSummary + groups
    + '</div>';
}
function copyBackupLog(bid) {
  var b = S.backups.find(function(x){return x.id===bid;});
  if (!b || !b.backup_log) return;
  navigator.clipboard.writeText(b.backup_log).then(function(){
    var btn = document.querySelector('button[onclick="copyBackupLog('+bid+')"]');
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(function(){ btn.textContent = '⧉ Copy'; }, 1800); }
  }).catch(function(){
    // Fallback for older browsers
    var ta = document.createElement('textarea');
    ta.value = b.backup_log;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

// ─── Schedules ──────────────────────────────────────────────────────────────
function buildSchedulesList(SS) {
  SS = SS || S.schedules; var C = S.connections, B = S.backups;
  if (!SS.length) return emptyState('schedules', 'No schedules yet', 'Click + New Schedule to get started');
  function renderScheduleCard(s) {
    var conn = C.find(function(c){ return c.id === s.connection_id; });
    var clr  = dc(conn && conn.db_type);
    var icon = dicon(conn && conn.db_type, 18);
    var connName = conn ? conn.name : 'Connection #' + s.connection_id;
    var dbType   = conn ? (conn.db_type||'').toUpperCase() : '—';
    var host     = conn ? conn.host + ':' + conn.port : '';
    var lastRun  = (s.last_run_at || s.last_run) ? fmtDT(s.last_run_at || s.last_run) : null;
    var nextRun  = s.next_run ? fmtDT(s.next_run) : null;
    var destLabel = storageDestinationLabel(s.destination || 'dbaegis_local');

    // Last 8 backups for this connection
    var connBackups = B.filter(function(b){ return b.connection_id === s.connection_id; }).slice(0,8);
    var successN = connBackups.filter(function(b){ return dashboardIsSuccessStatus(b.status); }).length;
    var failN    = connBackups.filter(function(b){ return dashboardIsFailureStatus(b.status); }).length;
    var totalSz  = connBackups.reduce(function(a,b){ return a+(b.size_bytes||0); },0);
    var szFmt    = totalSz>1024*1024?(totalSz/1024/1024).toFixed(1)+' MB':(totalSz/1024).toFixed(0)+' KB';

    var histRows = connBackups.slice(0,5).map(function(b) {
      var bsc = SC[String(b.status||'').toLowerCase()]||'#8896B0', bsb = SB[String(b.status||'').toLowerCase()]||'#1E2640';
      var sz  = b.size_bytes ? (b.size_bytes>1024*1024?(b.size_bytes/1024/1024).toFixed(1)+' MB':(b.size_bytes/1024).toFixed(0)+' KB') : '—';
      var dur = b.duration_sec ? b.duration_sec.toFixed(1)+'s' : '—';
      var fp  = b.file_path ? String(b.file_path).split('/').pop() : '—';
      var mode = normalizeBackupType(b.backup_type || 'logical');
      var modeColor = mode === 'physical' ? '#A78BFA' : '#4E9FFF';
      return '<tr>'
        +'<td style="font-size:11px;color:#4E5A78;font-family:monospace">#'+b.id+'</td>'
        +'<td style="font-size:11px;color:#8896B0">'+fmtDT(b.started_at||'')+'</td>'
        +'<td><span class="tag" style="background:'+modeColor+'18;color:'+modeColor+';border-color:'+modeColor+'44;font-size:10px">'+mode.toUpperCase()+'</span></td>'
        +'<td style="font-size:11px;color:#8896B0">'+dur+'</td>'
        +'<td style="font-size:11px;color:#4E9FFF">'+sz+'</td>'
        +'<td style="font-size:11px;color:#4E5A78;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(b.file_path||'')+'">'+escHtml(fp)+'</td>'
        +'<td><span class="tag" style="background:'+bsb+';color:'+bsc+';font-size:10px">'+escHtml(String(b.status||'').toUpperCase())+'</span></td>'
        +'<td title="'+escHtml(b.error_msg||'')+'" style="font-size:10px;color:#FF5A5A;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(b.error_msg||'')+'</td>'
        +'</tr>';
    }).join('');

    var histPanel = connBackups.length
      ? '<div style="border-top:1px solid #1A2035;background:#0B0E17">'
        +'<div style="padding:10px 20px;display:flex;align-items:center;justify-content:space-between">'
        +'<div style="font-size:11px;color:#4E5A78;text-transform:none;letter-spacing:.1em">Recent Connection Backup History</div>'
        +'<div style="display:flex;gap:14px;font-size:11px;align-items:center">'
        +'<span style="color:#00D97E">✓ '+successN+' success</span>'
        +(failN?'<span style="color:#FF5A5A">✗ '+failN+' failed</span>':'')
        +'<span style="color:#4E9FFF">⬡ '+szFmt+' total</span>'
        +'<button onclick="setNav(&quot;backups&quot;)" style="font-size:11px;color:#4E9FFF;background:none;border:none;cursor:pointer;font-family:inherit;padding:0">View all →</button>'
        +'</div></div>'
        +'<div style="overflow-x:auto">'
        +'<table style="width:100%"><thead><tr>'
        +'<th style="font-size:10px">ID</th><th style="font-size:10px">Started</th>'
        +'<th style="font-size:10px">Mode</th><th style="font-size:10px">Duration</th><th style="font-size:10px">Size</th>'
        +'<th style="font-size:10px">File</th><th style="font-size:10px">Status</th><th style="font-size:10px">Error</th>'
        +'</tr></thead><tbody>'+histRows+'</tbody></table>'
        +'</div></div>'
      : '<div style="border-top:1px solid #1A2035;padding:12px 20px;font-size:12px;color:#4E5A78">No backups run yet.</div>';

    return '<div class="card" style="padding:0;margin-bottom:14px;overflow:hidden;opacity:'+(s.active?1:.65)+'">'
      +'<div style="padding:16px 20px;display:flex;align-items:center;gap:16px">'
      +'<div style="width:42px;height:42px;border-radius:9px;background:'+clr+'22;border:1px solid '+clr+'44;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'+icon+'</div>'
      +'<div style="flex:1">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
      +'<span style="font-weight:400;font-size:14px">'+escHtml(connName)+'</span>'
      +'<span style="font-size:10px;color:'+clr+';background:'+clr+'18;border:1px solid '+clr+'33;border-radius:4px;padding:1px 6px;font-weight:400">'+escHtml(dbType)+'</span>'
      +(host?'<span style="font-size:11px;color:#4E5A78">'+escHtml(host)+'</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:#4E5A78;display:flex;gap:14px;flex-wrap:wrap">'
      +'<span title="Frequency">⏱ '+escHtml(s.frequency || '')+'</span>'
      +'<span title="Cron">Cron <code style="color:#8896B0">'+escHtml(s.cron_expr || '')+'</code></span>'
      +'<span title="Retention">Retention '+safeInt(s.retention_days,0)+'d</span>'
      +'<span title="Destination">→ '+escHtml(destLabel)+'</span>'
      +(lastRun?'<span title="Last run" style="color:#4E9FFF">last: '+lastRun+'</span>':'')
      +(nextRun?'<span title="Next run" style="color:#A78BFA">next: '+nextRun+'</span>':'')
      +'</div>'
      + connectionTagsHtml(s)
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">'
      +'<span style="font-size:12px;color:'+(s.active?'#00D97E':'#4E5A78')+'">'+(s.active?'Active':'Paused')+'</span>'
      +'<button class="toggle" style="background:'+(s.active?'#00D97E':'#2A3350')+'" onclick="doToggleSched('+s.id+','+s.active+')">'
      +'<div class="toggle-knob" style="left:'+(s.active?21:3)+'px"></div></button>'
      +'<button class="btn-sm" style="background:#4E9FFF18;color:#4E9FFF;border-color:#4E9FFF44" onclick="doRunSched('+s.id+')">Run Now</button>'
      +'<button class="btn-sm" style="background:#A78BFA18;color:#A78BFA;border-color:#A78BFA44" onclick="openEditSched('+s.id+')">Edit</button>'
      +'<button class="btn-sm" style="background:#FF5A5A18;color:#FF5A5A;border-color:#FF5A5A33" onclick="doDelSched('+s.id+')">Delete</button>'
      +'</div>'
      +'</div>'
      + histPanel
      +'</div>';
  }

  var dbBuckets = [];
  var dbMap = {};
  SS.forEach(function(s) {
    var conn = C.find(function(c){ return c.id === s.connection_id; });
    var dbKey = String((conn && conn.db_type) || 'unknown').toLowerCase();
    if (!dbMap[dbKey]) {
      dbMap[dbKey] = {
        key: dbKey,
        label: dbKey.toUpperCase(),
        color: dc(dbKey),
        icon: dicon(dbKey, 16),
        rows: [],
        latestTs: 0
      };
      dbBuckets.push(dbMap[dbKey]);
    }
    dbMap[dbKey].rows.push(s);
    var scheduleTs = parseApiDateLocal(s.next_run || s.last_run_at || s.last_run || s.created_at || '');
    dbMap[dbKey].latestTs = Math.max(dbMap[dbKey].latestTs, scheduleTs ? scheduleTs.getTime() : 0);
  });
  dbBuckets.sort(function(a,b){ return b.latestTs - a.latestTs; });

  return dbBuckets.map(function(bucket) {
    var expanded = !!((S.expandedScheduleDbGroups||{})[bucket.key]);
    return '<div style="margin-bottom:20px">'
      + '<div onclick="toggleScheduleDbGroup('+jsArg(bucket.key)+')" style="display:flex;align-items:center;gap:10px;margin-bottom:'+(expanded?10:0)+'px;padding:0 2px;cursor:pointer;user-select:none">'
      + '<div style="width:34px;height:34px;border-radius:9px;background:'+bucket.color+'22;border:1px solid '+bucket.color+'44;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+bucket.icon+'</div>'
      + '<div style="font-size:13px;font-weight:400;color:#E2E8F0">'+escHtml(bucket.label)+'</div>'
      + '<div style="font-size:11px;color:#4E5A78">'+bucket.rows.length+' schedule'+(bucket.rows.length!==1?'s':'')+'</div>'
      + '<div style="margin-left:auto;color:#4E5A78;font-size:13px">'+(expanded?'▲':'▼')+'</div>'
      + '</div>'
      + (expanded ? bucket.rows.map(renderScheduleCard).join('') : '')
      + '</div>';
  }).join('');
}

function vSchedules() {
  var rows = (S.schedules||[]);
  var q = (S.scheduleSearch || '').toLowerCase().trim();
  if (q) {
    rows = rows.filter(function(r){
      return [
        r.connection_name || '',
        r.host || '',
        r.db_type || '',
        r.frequency || '',
        r.cron_expr || '',
        r.destination || '',
        (r.active ? 'active' : 'paused')
      ].join(' ').toLowerCase().indexOf(q) >= 0;
    });
  }
  var allRows = S.schedules || [];
  var nowMs = Date.now();
  var activeN = allRows.filter(function(s){ return !!s.active; }).length;
  var pausedN = allRows.filter(function(s){ return !s.active; }).length;
  var overdueN = allRows.filter(function(s){
    var d = parseApiDateLocal(s.next_run || '');
    return !!s.active && d && d.getTime() < nowMs - 300000;
  }).length;
  var noRecentSuccessN = allRows.filter(function(s){
    var b = latestConnectionBackup(s.connection_id, true);
    var d = b ? parseApiDateLocal(dashboardJobTimestamp(b)) : null;
    return !d || (Date.now() - d.getTime()) > 86400000;
  }).length;
  var metrics = '<div class="metric-grid" style="margin-bottom:16px">'
    + uiMetricCard('Active', activeN, 'enabled schedules', '#00D97E')
    + uiMetricCard('Paused', pausedN, 'disabled schedules', pausedN ? '#FFB900' : '#4E5A78')
    + uiMetricCard('Overdue', overdueN, 'missed next run', overdueN ? '#FF5A5A' : '#4E5A78')
    + uiMetricCard('No Recent Success', noRecentSuccessN, 'no successful backup in 24h', noRecentSuccessN ? '#FFB900' : '#4E5A78')
    + '</div>';

  return '<div>'
    + '<div style="font-size:15px;color:#E2E8F0;margin-bottom:18px">Schedules</div>'
    + metrics
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;max-width:560px">'
    +   '<input id="schedule-search" type="text" placeholder="Search schedules..." value="'+escHtml(S.scheduleSearch||'')+'" oninput="setScheduleSearch(this.value)" />'
    +   '<button id="schedule-search-clear" class="btn-sm" style="display:' + (q ? 'block' : 'none') + ';background:#1E2640;color:#8896B0;border-color:#2A3350" onclick="setScheduleSearch(\'\')">Clear</button>'
    + '</div>'
    + '<div id="schedule-results">' + buildSchedulesList(rows) + '</div>'
    + '</div>';
}

// ─── Storage ────────────────────────────────────────────────────────────────
function storageTestResults() {
  try { return JSON.parse(localStorage.getItem('dbaegis_storage_test_results') || '{}') || {}; }
  catch(e) { return {}; }
}

function setStorageTestResult(id, result) {
  var data = storageTestResults();
  data[String(id)] = Object.assign({checked_at:new Date().toISOString()}, result || {});
  try { localStorage.setItem('dbaegis_storage_test_results', JSON.stringify(data)); } catch(e) {}
}

function storageValueMatchesId(value, id) {
  var v = String(value == null ? '' : value).trim();
  return v === String(id);
}

function storageUsageInfo(id) {
  var sid = String(id);
  function connValues(c) {
    var opts = safeJsonObj(c.options_json || c.options);
    return [c.destination, c.default_destination, opts.destination, opts.default_destination];
  }
  var connections = (S.connections || []).filter(function(c){
    return connValues(c).some(function(v){ return storageValueMatchesId(v, sid); });
  });
  var schedules = (S.schedules || []).filter(function(s){ return storageValueMatchesId(s.destination, sid); });
  var backups = (S.backups || []).filter(function(b){ return storageValueMatchesId(b.destination, sid); });
  return {connections:connections, schedules:schedules, backups:backups, total:connections.length + schedules.length + backups.length};
}

function storageUsageText(usage) {
  var parts = [];
  if (usage.connections.length) parts.push(usage.connections.length + ' connection' + (usage.connections.length !== 1 ? 's' : ''));
  if (usage.schedules.length) parts.push(usage.schedules.length + ' schedule' + (usage.schedules.length !== 1 ? 's' : ''));
  if (usage.backups.length) parts.push(usage.backups.length + ' backup record' + (usage.backups.length !== 1 ? 's' : ''));
  return parts.length ? ('Used by ' + parts.join(' · ')) : 'Not used by active connections or schedules';
}

function storageUiType(d) {
  var type = String((d && (d.dest_type || d.storage_type || d.type)) || '').toLowerCase();
  if (!type || type === 'dbaegis' || type === 'dbaegis_local' || type === 'local_storage') return 'local';
  return type;
}

function isBuiltinDbaegisLocalStorage(d) {
  var id = String((d && d.id) || '').toLowerCase();
  var type = String((d && (d.storage_type || d.dest_type || d.type)) || '').toLowerCase();
  return id === 'dbaegis_local' || type === 'dbaegis_local' || type === 'local_storage';
}

function vSelfBackup() {
  var SB = S.selfbackups || [];

  if (!licenseFeatureEnabled('self_backup')) {
    return lockedFeaturePanel({
      icon:'system',
      title:'System Backups',
      requiredEdition:'Professional or Enterprise',
      detail:'DBAegis control-plane snapshots are preserved during Community downgrade, but snapshot automation and restore actions are locked.',
      metrics:[
        {label:'Snapshot Records', value:SB.length, sub:SB.length ? 'preserved read-only' : 'none found', color:SB.length ? '#4E9FFF' : '#4E5A78'},
        {label:'Retention', value:(settings.retention_count || settings.retain_count || '-'), sub:'locked in Community', color:'#FFB900'},
        {label:'Snapshot Path', value:(settings.base_path || '/backups/self'), sub:'existing files remain on disk', color:'#94A3B8'}
      ],
      facts:[
        'Manual snapshots require Professional or Enterprise.',
        'Automatic snapshot retention is paused while Community is installed.',
        'Upgrade to re-enable snapshot create, delete, and restore workflows.'
      ]
    });
  }
  var retentionCount = safeInt(settings.retention_count || settings.retain_count, 10);
  var basePath = settings.base_path || '/backups/self';
  var autoEnabled = settings.auto_enabled !== false;
  var autoCron = settings.auto_cron || '0 0 * * *';
  var TRIGGER_COLOR = {
    'startup':       '#4E9FFF',
    'manual':        '#00D97E',
    'auto':          '#A78BFA',
    'schedule':      '#A78BFA',
    'config-change': '#F4D03F',
    'pre-restore':   '#E67E22',
    'scheduled':     '#A78BFA',
  };
  function selfBackupSize(bytes) {
    bytes = Number(bytes || 0);
    if (!bytes) return '-';
    if (bytes >= 1024 * 1024 * 1024) return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    return (bytes / 1024).toFixed(0) + ' KB';
  }
  var totalSize = SB.reduce(function(sum, b){ return sum + Number(b.size_bytes || 0); }, 0);
  var latest = SB[0] || null;
  var triggerCounts = SB.reduce(function(acc, b){
    var key = String(b.trigger || 'manual').toLowerCase();
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
  var autoCount = (triggerCounts.auto || 0) + (triggerCounts.startup || 0) + (triggerCounts.schedule || 0) + (triggerCounts.scheduled || 0);

  var rows = SB.map(function(b, idx) {
    var triggerKey = String(b.trigger || 'manual').toLowerCase();
    var tc = TRIGGER_COLOR[triggerKey] || '#8896B0';
    var sz = selfBackupSize(b.size_bytes);
    var dt = fmtDT(b.created_at || '');
    var note = b.note || '';
    return '<tr>'
      +'<td style="font-family:monospace;font-size:11px;color:#4E9FFF">#'+(idx+1)+'</td>'
      +'<td style="font-family:monospace;font-size:11px;color:#8896B0;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(b.file_path || b.filename || '')+'">'+escHtml(b.filename)+'</td>'
      +'<td>'+escHtml(dt)+'</td>'
      +'<td style="color:#E2E8F0">'+sz+'</td>'
      +'<td><span class="tag" style="background:'+tc+'22;color:'+tc+';border-color:'+tc+'44;font-size:10px">'+escHtml(triggerKey.replace(/-/g,' ').toUpperCase())+'</span></td>'
      +'<td style="font-size:11px;color:#4E5A78;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escHtml(note)+'">'+escHtml(note)+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="btn-sm" style="background:#FF5A5A18;color:#FF5A5A;border-color:#FF5A5A33" '
          +'onclick="deleteSelfBackup('+b.id+')">Delete</button>'

  var metrics = '<div class="metric-grid">'
    + '<div class="card" style="padding:18px 20px"><div style="font-size:11px;color:#94A3B8;margin-bottom:8px">Snapshot Sets</div><div style="font-size:24px;color:#fff">'+SB.length+'</div></div>'
    + '<div class="card" style="padding:18px 20px"><div style="font-size:11px;color:#94A3B8;margin-bottom:8px">Retention</div><div style="font-size:24px;color:#4E9FFF">'+retentionCount+'</div><div style="font-size:11px;color:#4E5A78;margin-top:3px">latest sets</div></div>'
    + '<div class="card" style="padding:18px 20px"><div style="font-size:11px;color:#94A3B8;margin-bottom:8px">Total Size</div><div style="font-size:24px;color:#00D97E">'+selfBackupSize(totalSize)+'</div></div>'
    + '<div class="card" style="padding:18px 20px"><div style="font-size:11px;color:#94A3B8;margin-bottom:8px">Latest Snapshot</div><div style="font-size:14px;color:#E2E8F0">'+(latest ? escHtml(fmtDT(latest.created_at || '')) : '-')+'</div><div style="font-size:11px;color:#4E5A78;margin-top:5px">'+autoCount+' automatic</div></div>'
    + '</div>';

  var settingsPanel = '<div class="form-panel" style="margin-bottom:18px">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap">'
    + '<div><div style="font-size:13px;color:#E2E8F0;margin-bottom:4px">Snapshot Settings</div>'
    + '<div style="font-size:12px;color:#4E5A78">Protect DBAegis metadata, configuration, and backup history independently from managed database backups.</div></div>'
    + '<button onclick="saveSelfBackupRetention()" class="btn btn-primary">Save Settings</button>'
    + '</div>'
    + '<div class="form-grid">'
    + '<div><label>Retention Count</label><input id="self_backup_retention_count" type="number" min="1" max="500" value="'+retentionCount+'" /></div>'
    + '<div><label>Snapshot Path</label><input id="self_backup_base_path" type="text" value="'+escHtml(basePath)+'" placeholder="/backups/self" /></div>'
    + '<div><label>Auto Snapshots</label><div style="height:39px;display:flex;align-items:center"><input id="self_backup_auto_enabled" type="checkbox" '+(autoEnabled?'checked':'')+' style="width:auto;accent-color:#4E9FFF" /></div></div>'
    + '<div><label>Auto Cron</label><input id="self_backup_auto_cron" type="text" value="'+escHtml(autoCron)+'" placeholder="0 0 * * *" /></div>'
    + '</div>'
    + '</div>';

  var snapshotsTable = '<div class="section-toolbar">'
    + '<div><div style="font-size:15px;color:#fff;margin-bottom:4px">Snapshot Sets</div><div style="font-size:12px;color:#94A3B8">Manual, startup, and scheduled DBAegis system snapshots.</div></div>'
    + '<button class="btn" onclick="refresh()">Refresh</button>'
    + '</div>'
    + '<div class="card responsive-table">'
    + (SB.length === 0
      ? '<div class="empty">No snapshot sets yet. Older sets will be deleted automatically based on retention.</div>'
      : '<table><thead><tr><th>#</th><th>Filename</th><th>Created</th><th>Size</th><th>Trigger</th><th>Note</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>'
    )
    + '</div>';

  var restoreNote = '<div class="form-panel" style="margin-top:16px">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px">'
    + '<div><div style="font-size:12px;color:#E2E8F0;margin-bottom:4px">Restore Checklist</div>'
    + '<div style="font-size:11px;color:#4E5A78;line-height:1.5">System snapshot restore stays manual for safety. Use this checklist before touching live control-plane files.</div></div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px">'
    + ['Stop DBAegis service','Preserve live DBAEGIS_SECRET_KEY','Restore metadata DB and config files','Verify ownership and permissions','Restart DBAegis and run health checks'].map(function(step, idx){
        return '<div style="padding:10px 12px;background:#0B0E17;border:1px solid #1A2035;border-radius:8px;font-size:11px;color:#94A3B8"><span style="color:#4E9FFF;margin-right:6px">'+(idx+1)+'.</span>'+escHtml(step)+'</div>';
      }).join('')
    + '</div>'
    + '</div>';

  return '<div>'
    + '<div class="section-toolbar">'
    + '<div><div style="font-size:15px;color:#fff;margin-bottom:4px">System Backups</div><div style="font-size:12px;color:#94A3B8">SQLite metadata and configuration snapshots for the DBAegis control plane.</div></div>'
    + '<button class="btn btn-primary" onclick="triggerSelfSnapshot()">+ Take Snapshot</button>'
    + '</div>'
    + metrics
    + settingsPanel
    + snapshotsTable
    + restoreNote
    + '</div>';
}

async function triggerSelfSnapshot() {
  if (!licenseFeatureEnabled('self_backup')) { showToast(licenseFeatureNotice('System backups'), 'error'); return; }
  try {
    var note = prompt('Snapshot note (optional):', 'Manual snapshot');
    if (note === null) return;
    await apiFetch('/api/self-backups/snapshot', {method:'POST', body:JSON.stringify({note:note})});
    showToast('Snapshot created');
    await refresh();
  } catch(e) { showToast('Snapshot failed: '+e.message, 'error'); }
}

async function deleteSelfBackup(id) {
  if (!licenseFeatureEnabled('self_backup')) { showToast(licenseFeatureNotice('System backups'), 'error'); return; }
  if (!confirm('Delete this snapshot?')) return;
  try {
    await apiFetch('/api/self-backups/'+id, {method:'DELETE'});
    showToast('Snapshot deleted');
    await refresh();
  } catch(e) { showToast('Delete failed: '+e.message, 'error'); }
}

// ─── Restore Jobs ────────────────────────────────────────────────────────────
function restoreSourceOptionKeys() {
  return [
    'source_file','source_datadir','source_dbpath','archive_path','archive_file',
    'dump_file','cql_file','snapshot_dir','cypher_file','backup_path','sql_file',
    'bak_file','json_file','bacpac_file','clickhouse_file','backup_file','rman_backup_file'
  ];
}

function clearRestoreSourceOptionAliases(options) {
  options = options || {};
  restoreSourceOptionKeys().forEach(function(k){ delete options[k]; });
  return options;
}

function isRestoreCloudSourcePath(value) {
  return /^(s3|gcs|gs|azure|az):\/\//i.test(String(value || '').trim());
}

function normalizeCloudStorageScheme(value) {
  var val = String(value || '').toLowerCase().replace(/_/g, '-');
  var aliases = {
    aws: 's3',
    amazon: 's3',
    s3compatible: 's3',
    's3-compatible': 's3',
    minio: 's3',
    google: 'gcs',
    googlecloudstorage: 'gcs',
    'google-cloud-storage': 'gcs',
    google_cloud_storage: 'gcs',
    gcp: 'gcs',
    gs: 'gcs',
    az: 'azure',
    azblob: 'azure',
    azureblob: 'azure',
    azure_blob: 'azure',
    'azure-blob': 'azure',
    blob: 'azure'
  };
  return aliases[val] || val;
}

function restoreCloudStorageType(d) {
  return normalizeCloudStorageScheme((d || {}).dest_type || (d || {}).storage_type || (d || {}).type || '');
}

function restoreCloudStorageTypeFromUri(uri) {
  var match = String(uri || '').trim().match(/^([a-z][a-z0-9+.-]*):\/\//i);
  return match ? normalizeCloudStorageScheme(match[1]) : '';
}

function restoreCloudStorageTypeLabel(type) {
  var labels = {s3:'AWS S3', azure:'Azure', gcs:'GCS'};
  return labels[normalizeCloudStorageScheme(type || '')] || String(type || '').toUpperCase();
}

function restoreCloudStorageDestinations(storageType) {
  if (!licenseFeatureEnabled('restores.cloud')) return [];
  var requestedType = normalizeCloudStorageScheme(storageType || '');
  return (S.storage || []).filter(function(d){
    var dtype = restoreCloudStorageType(d);
    return d.active && ['s3','gcs','azure'].indexOf(dtype) >= 0 && licenseDestinationEnabled(String(d.id), true) && (!requestedType || dtype === requestedType);
  });
}

function restoreCloudStorageById(id) {
  return restoreCloudStorageDestinations().find(function(d){ return String(d.id) === String(id); }) || null;
}

function restoreCloudStorageTypes(destinations) {
  var seen = {};
  var order = ['s3','azure','gcs'];
  (destinations || restoreCloudStorageDestinations()).forEach(function(d){
    var dtype = restoreCloudStorageType(d);
    if (dtype) seen[dtype] = true;
  });
  return order.filter(function(type){ return !!seen[type]; });
}

function restoreCloudStorageTypeButtons(types, selectedType, handlerName) {
  if (!types || !types.length) return '';
  var current = normalizeCloudStorageScheme(selectedType || types[0]);
  return '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:6px">'
    + types.map(function(type){
        var active = normalizeCloudStorageScheme(type) === current;
        return '<button type="button" onclick="'+handlerName+'(\''+escHtml(type)+'\')" '
          +'style="display:flex;align-items:center;justify-content:center;padding:9px 8px;border-radius:8px;border:1px solid '+(active?'#4E9FFF':'#2A3350')+';background:'+(active?'#4E9FFF18':'#131929')+';color:'+(active?'#4E9FFF':'#8896B0')+';cursor:pointer;font-size:12px;font-family:inherit;font-weight:'+(active?'700':'500')+'">'
          +escHtml(restoreCloudStorageTypeLabel(type))
          +'</button>';
      }).join('')
    + '</div>';
}

function restoreCloudStorageBucketName(d) {
  return String((d || {}).bucket_name || (d || {}).bucket || (d || {}).container_name || (d || {}).container || '').trim();
}

function restoreCloudStoragePrefix(d) {
  return String((d || {}).path_prefix || (d || {}).prefix || '').trim().replace(/^\/+|\/+$/g, '');
}

function restoreCloudStorageUri(storageType, bucket, prefix) {
  var scheme = normalizeCloudStorageScheme(storageType || '');
  if (scheme === 'gcs') scheme = 'gs';
  if (!scheme || !bucket) return '';
  var cleanPrefix = String(prefix || '').trim().replace(/^\/+|\/+$/g, '');

  var cloudBrowserStatus = window._rf.cloud_objects_loading

      : (window._rf.cloud_objects_loaded

          : '<div style="font-size:11px;color:#FFB900;margin-top:5px">No files found under '+escHtml(cloudBrowseUri || 'the selected prefix')+'. '+(selectedCloudBasePrefix ? 'Leave Cloud Folder Prefix blank to search the configured base path, or enter a full cloud URI to browse outside it.' : 'Try a different folder prefix or a full cloud URI prefix.')+'</div>')
        : '<div style="font-size:11px;color:#4E5A78;margin-top:5px">'+(selectedCloudBaseUri ? 'Blank prefix lists '+escHtml(selectedCloudBaseUri)+'.' : 'Select storage, then list files to select a cloud object for restore.')+'</div>'));
  var cloudFileSelectRow = cloudObjects.length
    ? frow('Cloud File',

        +'<div style="font-size:11px;color:#4E5A78;margin-top:4px">Selecting a file writes its full URI into Restore Source File.</div>')
    : '';
  var sourceStorageRow = sourceType === 'cloud_file' ? (
    frow('Cloud Storage Type',

      +'<div style="font-size:11px;color:#4E5A78;margin-top:4px">Filters saved cloud locations so the list only shows the selected provider.</div>')
    +frow('Cloud Storage Location',
      '<select id="restore-source-storage-select" onchange="restoreJobSourceStorageChanged(this.value)">'
      +restoreCloudStorageOpts
      +'</select>'
      +'<div style="font-size:11px;color:#4E5A78;margin-top:4px">'+(selectedCloudBaseUri ? 'Base path: '+escHtml(selectedCloudBaseUri) : 'Saved '+escHtml(restoreCloudStorageTypeLabel(sourceStorageType))+' destination used to read the selected restore file.')+'</div>')
    +frow('Cloud Folder Prefix',
      '<div style="display:flex;gap:8px;align-items:center">'

    ? 'External cloud file'
    : (sourceType === 'inventory' ? 'Inventory backup' : 'Local path');

  var summaryPitrLabel = (['postgresql','mysql','mariadb','oracle','mssql'].indexOf(window._rf.db_type) >= 0 && window._rf.restore_mode === 'physical')

    +restoreSummaryCell('Mode', summaryPitrLabel, 'restore')
    +'</div>';

  modal(
    '<div class="restore-modal-shell">'
    +'<div style="display:flex;align-items:center;gap:9px;font-size:18px;font-weight:400;margin-bottom:14px;color:#F8FAFC">'+uiIcon('restore', 18)+'<span>New Restore Job</span></div>'
    +restoreSummaryHtml

    +frow('Database Type',
      '<select onchange="restoreJobSelectDbType(this.value)">'
      +dbTypeOpts
      +'</select>')

    +frow('Restore Type',
      '<select onchange="restoreJobSelectMode(this.value)">'
      +restoreModesForDb(window._rf.db_type).map(function(mode){
        return '<option value="'+mode+'" '+(window._rf.restore_mode===mode?'selected':'')+'>'+restoreModeLabel(mode)+'</option>';
      }).join('')
      +'</select>')

    +frow('Connection',
      '<select onchange="restoreJobSelectConnection(this.value)">'
      +connOpts
      +'</select>')

    +frow('Restore Source',
      '<select onchange="restoreJobSelectSourceType(this.value)">'
      +sourceTypeOpts
      +'</select>'
      +'<div style="font-size:11px;color:#4E5A78;margin-top:4px">Use External cloud file for artifacts uploaded outside DBAegis.</div>')

    +sourceStorageRow
    +inventoryRow

    +frow(sourcePathLabel, sourcePathInput)

    +frow('Flags',
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;padding:4px 0">'
      +optionCheckboxHtml('window._rf.dry_run=this.checked', !!window._rf.dry_run, 'Dry run', '')
      +optionCheckboxHtml('window._rf.create_if_missing=this.checked', !!window._rf.create_if_missing, 'Create if missing', '')
      +optionCheckboxHtml('window._rf.overwrite_existing=this.checked', !!window._rf.overwrite_existing, 'Overwrite existing', '')
      +optionCheckboxHtml('window._rf.verify_after_restore=this.checked', !!window._rf.verify_after_restore, 'Verify after restore', '')
      +'</div>')

    +renderDbSpecificRestoreOptions()

    +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">'

    +'<button class="btn btn-primary" onclick="createRestoreJob()">Create Restore Job</button>'
    +'</div>'
    +'</div>'
  );

function restoreSecurityBool(v) {
  if (v === true) return true;
  return ['1','true','yes','on'].indexOf(String(v || '').toLowerCase()) >= 0;
}

  var mode = String(body.restore_mode || opts.restore_mode || 'logical').toLowerCase();
  var keys = [
    'overwrite','overwrite_existing','overwrite_if_exists','overwrite_existing_files','overwrite_data_directory',
    'replace_existing','clean_before_restore','drop_existing_objects','drop_before_restore','truncate_before_load',
    'recreate_database','recreate_db','restore_users_roles','stop_service_before_restore'
  ];
  var flags = [];
  if (mode === 'physical') flags.push('physical_restore');
  keys.forEach(function(k){
    if (restoreSecurityBool(body[k]) || restoreSecurityBool(opts[k])) flags.push(k);
  });
  flags = flags.filter(function(v, i, a){ return a.indexOf(v) === i; });
  return {required: true, dry_run: dryRun, target: target, flags: flags};
}

function prepareRestoreStartPayload(payload) {
  var details = restoreSecurityDetails(payload);
  if (!details.required) return Promise.resolve(payload);
  return new Promise(function(resolve, reject) {
    window._restoreSecurityPending = {payload: payload, details: details, resolve: resolve, reject: reject};
    var flagHtml = details.flags.length
      ? '<div style="font-size:11px;color:#FFB900;margin-top:6px">High-risk flags: ' + escHtml(details.flags.join(', ')) + '</div>'
      : '';
    var confirmationHtml = details.flags.length
      ? '<div style="margin-top:12px"><label>Type Target Name</label><input id="restore_security_confirm" type="text" autocomplete="off" placeholder="' + escHtml(details.target) + '" /></div>'
      : '';
    document.getElementById('modals').innerHTML =
      '<div class="modal-overlay">'
      + '<div class="modal" style="max-width:520px">'
      + '<div style="padding:20px 22px;border-bottom:1px solid #1E2640;display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-weight:400;font-size:15px">Authorize Restore</span>'
      + '<button onclick="restoreSecurityCancel()" style="background:none;border:none;color:#4E5A78;cursor:pointer;font-size:20px;font-family:inherit">×</button></div>'

      + '<div style="font-size:12px;color:#94A3B8;line-height:1.5;margin-bottom:14px">Target: <span style="color:#E2E8F0">' + escHtml(details.target) + '</span>' + flagHtml + '</div>'

      + '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">'

    setTimeout(function(){
